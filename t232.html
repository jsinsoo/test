<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>문제 해결에 필요한 데이터 종합 평가</title>
    <style>
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            line-height: 1.7;
            margin: 20px;
            background-color: #f8f9fa;
            color: #212529;
        }
        .container {
            max-width: 850px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 1px solid #dee2e6;
        }
        h1, h2 {
            color: #0056b3;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
            margin-top: 25px;
        }
        h1 { margin-top: 0; }
        .info-input {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            background-color: #f1f3f5;
            display: flex;
            align-items: center;
        }
        .info-input label {
            margin-right: 10px;
            font-weight: bold;
        }
        .info-input input {
            padding: 8px;
            border: 1px solid #adb5bd;
            border-radius: 5px;
            margin-right: 20px;
        }
        .question {
            margin-bottom: 25px;
            padding: 20px;
            border-left: 5px solid #007bff;
            background-color: #fdfdff;
            border-radius: 0 8px 8px 0;
            border: 1px solid #e0e0e0;
            border-left-width: 5px;
        }
        .question p {
            font-size: 1.15em;
            font-weight: bold;
            margin: 0 0 15px 0;
            white-space: pre-line;
        }
        .question label {
            display: block;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            border: 1px solid #f0f0f0;
        }
        .question label:hover {
            background-color: #e9ecef;
        }
        .explanation {
            margin-top: 15px;
            padding: 12px;
            border-radius: 5px;
            background-color: #e7f3fe;
            border: 1px solid #bce0fd;
            display: none; /* Initially hidden */
            font-size: 0.95em;
        }
        #submitBtn {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.25em;
            font-weight: bold;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin-top: 30px;
        }
        #submitBtn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        #result {
            margin-top: 25px;
            padding: 20px;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
        }
        .correct {
            background-color: #d1e7dd !important;
            border-color: #a3cfbb !important;
            font-weight: bold;
        }
        .incorrect {
            background-color: #f8d7da !important;
            border-color: #f1aeb5 !important;
        }
        .correct-answer-highlight {
            font-weight: bold;
            color: #0a58ca;
        }
        .tts-button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2em;
            margin-left: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>문제 해결에 필요한 데이터 종합 평가</h1>

    <div class="info-input">
        <label for="studentId">학번:</label>
        <input type="text" id="studentId" placeholder="학번 입력">
        <label for="studentName">이름:</label>
        <input type="text" id="studentName" placeholder="이름 입력">
    </div>

    <form id="quizForm">
        <!-- Questions will be dynamically inserted here -->
    </form>
    
    <button id="submitBtn" onclick="gradeAndSubmit(event)">제출 및 채점</button>

    <div id="result"></div>
</div>

<script>
    const synth = window.speechSynthesis;
    function speak(text) {
        if (synth.speaking) {
            synth.cancel();
        }
        const utterThis = new SpeechSynthesisUtterance(text);
        utterThis.lang = 'ko-KR';
        synth.speak(utterThis);
    }

    const questions = [
        {
            type: 'ox',
            sectionTitle: "I. 진단평가 (OX 퀴즈)",
            question: "데이터 기반 문제 해결에서 가장 먼저 해야 할 일은 데이터를 수집하는 것이다.",
            answer: "X",
            explanation: "가장 먼저 해야 할 일은 '풀고자 하는 문제를 명확하게 정의'하고, 그에 따라 '어떤 데이터가 필요한지(데이터 요구사항)'를 정하는 것입니다. 목표 없이 데이터를 모으는 것은 비효율적입니다."
        },
        {
            type: 'ox',
            question: "웹 스크래핑은 웹 페이지의 HTML에서 원하는 정보를 자동으로 추출하는 데이터 수집 기술이다.",
            answer: "O",
            explanation: "웹 스크래핑(또는 크롤링)은 프로그램이 웹 페이지에 접속하여, HTML 태그 구조를 분석하고 그 안의 텍스트나 링크 등의 데이터를 수집하는 기술입니다."
        },
        {
            type: 'ox',
            question: "수집된 원시 데이터(Raw Data)는 대부분 완벽하여, 별도의 정제 과정 없이 바로 분석에 사용할 수 있다.",
            answer: "X",
            explanation: "원시 데이터는 결측치, 이상치, 비일관적인 표기 등 다양한 품질 문제를 포함하는 경우가 대부분입니다. 정확한 분석을 위해서는 데이터 정제(Data Cleaning) 과정이 필수적입니다."
        },
        {
            type: 'ox',
            question: "탐색적 데이터 분석(EDA)은 데이터의 기초 통계량을 계산하거나 시각화하여 데이터의 전반적인 특징을 파악하는 과정이다.",
            answer: "O",
            explanation: "EDA는 데이터에 대한 첫인상을 얻는 과정으로, 평균/중앙값/최빈값 등을 계산하거나 히스토그램/산점도 등을 그려보며 데이터의 분포와 숨겨진 패턴, 이상치 등을 탐색하는 활동입니다."
        },
        {
            type: 'ox',
            question: "\"학생의 최종 성적\"을 예측하는 문제를 풀 때, \"학생의 출석률\"은 필요한 데이터 항목이 될 수 있다.",
            answer: "O",
            explanation: "학생의 성실도를 나타내는 출석률은 성적과 관련이 있을 가능성이 높습니다. 이처럼 문제 해결과 관련이 있을 것이라 예상되는 변수를 정의하는 것이 '데이터 요구사항 정의'입니다."
        },
        {
            type: 'ox',
            question: "데이터의 '완전성'은 데이터에 오타나 잘못된 값이 없는 것을 의미한다.",
            answer: "X",
            explanation: "데이터에 오타나 잘못된 값이 없는 것은 '정확성(Accuracy)'에 해당합니다. '완전성(Completeness)'은 데이터에 누락된 값, 즉 결측치가 없는 정도를 의미합니다."
        },
        {
            type: 'ox',
            question: "API는 정부나 기업이 데이터를 외부에 제공하기 위해 만들어 놓은 공식적인 통로이다.",
            answer: "O",
            explanation: "API는 정해진 규칙에 따라 요청을 보내면, 정제된 데이터를 약속된 형식(주로 JSON)으로 받을 수 있는 안정적이고 효율적인 데이터 수집 방법입니다."
        },
        {
            type: 'ox',
            question: "\"서울특별시\"와 \"서울\"이 데이터에 섞여 있는 것은 데이터의 '일관성' 문제를 보여준다.",
            answer: "O",
            explanation: "동일한 대상을 다른 방식으로 표기하는 것은 데이터의 일관성을 해칩니다. 분석 전에 하나의 표현(예: '서울특별시')으로 통일하는 정제 작업이 필요합니다."
        },
        {
            type: 'ox',
            question: "데이터 수집 시, 다른 웹사이트의 정보를 무단으로 대량 수집하는 것은 저작권 문제가 발생할 수 있다.",
            answer: "O",
            explanation: "웹 스크래핑은 기술적으로 가능하더라도, 해당 웹사이트의 이용 약관(robots.txt 등)을 준수해야 하며, 저작권이 있는 콘텐츠를 무단으로 수집하고 상업적으로 이용하는 것은 법적 문제가 될 수 있습니다."
        },
        {
            type: 'ox',
            question: "이상치(Outlier)는 데이터의 전반적인 경향을 잘 보여주므로 분석에 반드시 포함해야 한다.",
            answer: "X",
            explanation: "이상치는 측정 오류나 특별한 이벤트로 인해 발생한, 대부분의 데이터와는 동떨어진 값입니다. 평균이나 표준편차와 같은 통계량에 큰 왜곡을 줄 수 있으므로, 분석 전에 그 원인을 파악하고 제거하거나 적절히 처리해야 하는 경우가 많습니다."
        },
        {
            type: 'mcq',
            sectionTitle: "II. 형성평가 (5지선다형)",
            question: "'배달 시간 예측' 모델을 만들기 위해 데이터를 수집하려고 한다. 다음 중 데이터 요구사항으로 가장 거리가 먼 것은?",
            options: ["주문 시간대", "배달 거리", "날씨 (비, 눈 등)", "배달 기사의 이름", "음식 종류 (조리 시간)"],
            answer: 3,
            explanation: "배달 시간은 주문 시간(교통량), 거리, 날씨, 조리 시간 등과 깊은 관련이 있습니다. 하지만 특정 배달 기사의 '이름' 자체는 배달 시간을 예측하는 데 직접적인 변수가 되기 어렵습니다. (물론 '기사의 숙련도'는 변수가 될 수 있지만, 이름은 식별자일 뿐입니다.)"
        },
        {
            type: 'mcq',
            question: "공공데이터포털에서 제공하는 '전국 미세먼지 측정 정보'를 내 프로그램으로 가져오고 싶을 때, 가장 적합하고 일반적인 데이터 수집 방법은?",
            options: ["웹 스크래핑", "API 호출", "설문조사", "직접 측정", "서버 로그 분석"],
            answer: 1,
            explanation: "공공데이터포털과 같이 데이터를 공식적으로 제공하는 기관은 대부분 외부 개발자들이 쉽고 안정적으로 데이터를 활용할 수 있도록 API를 제공합니다. 웹사이트의 화면 구조를 분석해야 하는 스크래핑보다 훨씬 효율적이고 안정적입니다."
        },
        {
            type: 'mcq',
            question: "수집된 나이 데이터 [21, 23, 22, 19, -5, 25] 에서 발견되는 가장 명백한 데이터 품질 문제는?",
            options: ["불완전성 (결측치)", "비일관성", "부정확성 (유효하지 않은 값)", "중복성", "낮은 활용성"],
            answer: 2,
            explanation: "나이는 음수 값을 가질 수 없습니다. -5는 명백히 잘못 입력되었거나 오류로 생성된 '유효하지 않은 값'으로, 데이터의 '정확성'에 문제가 있음을 보여줍니다."
        },
        {
            type: 'mcq',
            question: "데이터 기반 문제 해결의 첫 번째 단계인 '문제 정의'에서 가장 중요한 활동은?",
            options: ["어떤 프로그래밍 언어를 사용할지 결정하기", "해결하고자 하는 목표와 범위를 명확히 하기", "데이터를 저장할 데이터베이스 종류를 선택하기", "데이터 시각화에 사용할 그래프 종류를 정하기", "알고리즘의 시간 복잡도를 계산하기"],
            answer: 1,
            explanation: "'문제 정의' 단계에서는 기술적인 세부사항보다, '우리가 풀어야 할 문제가 정확히 무엇인가?', '성공의 기준은 무엇인가?'와 같이 프로젝트의 근본적인 목표와 방향을 설정하는 것이 가장 중요합니다."
        },
        {
            type: 'mcq',
            question: "정제된 데이터를 본격적으로 분석하기 전에, 데이터의 분포, 이상치 존재 여부, 변수 간의 관계 등을 시각적으로 확인하며 데이터에 대한 이해도를 높이는 과정을 무엇이라고 하는가?",
            options: ["데이터 수집 (Data Collection)", "데이터 모델링 (Data Modeling)", "탐색적 데이터 분석 (Exploratory Data Analysis)", "알고리즘 설계 (Algorithm Design)", "시스템 배포 (System Deployment)"],
            answer: 2,
            explanation: "EDA는 데이터와 '첫 만남'을 갖는 과정입니다. 복잡한 분석에 앞서 데이터가 어떻게 생겼는지, 어떤 특징을 가졌는지 대략적으로 훑어보며 분석 방향에 대한 직관과 아이디어를 얻는 중요한 탐색 단계입니다."
        },
        {
            type: 'mcq',
            question: "\"키가 175cm 이상이고, 몸무게가 70kg 미만인 사람 찾기\" 라는 문제를 풀기 위해, '키' 데이터와 '몸무게' 데이터를 모두 수집했다. 이 과정은 다음 중 무엇에 해당하는가?",
            options: ["데이터 정제", "데이터 요구사항 정의", "알고리즘 설계", "탐색적 데이터 분석", "데이터 시각화"],
            answer: 1,
            explanation: "'키'와 '몸무게'는 문제를 풀기 위해 반드시 필요한 데이터 항목(변수)입니다. 이처럼 어떤 데이터가 필요한지를 결정하고 정의하는 과정이 바로 '데이터 요구사항 정의'입니다."
        },
        {
            type: 'mcq',
            question: "수집된 센서 데이터에 누락된 값(결측치)이 많을 때, 이를 처리하는 방법으로 적절하지 않은 것은?",
            options: ["결측치가 포함된 행 전체를 삭제한다.", "다른 데이터들의 평균값이나 중앙값으로 대체한다.", "결측치를 0으로 일괄 대체한다.", "결측치를 그대로 둔 채 분석을 진행한다.", "머신러닝 모델을 이용해 가장 가능성 높은 값으로 예측하여 채운다."],
            answer: 3,
            explanation: "대부분의 분석 알고리즘과 라이브러리는 결측치를 처리하지 못하고 오류를 발생시킵니다. 따라서 결측치를 그대로 두고 분석을 진행하는 것은 거의 불가능하며, 분석 결과의 왜곡을 유발합니다. ①, ②, ③, ⑤는 모두 상황에 따라 사용되는 결측치 처리 방법입니다."
        },
        {
            type: 'mcq',
            question: "다음 중 데이터 수집 시 법적/윤리적 문제를 야기할 가능성이 가장 높은 행위는?",
            options: ["기상청 API를 통해 공개된 날씨 데이터를 수집하는 행위", "웹사이트의 'robots.txt' 정책을 무시하고 과도하게 웹 스크래핑하는 행위", "연구 목적으로 진행한 설문조사 응답 데이터를 분석하는 행위", "내가 직접 촬영한 우리 집 고양이 사진 데이터를 수집하는 행위", "공공데이터포털에 공개된 지하철 이용객 통계 데이터를 수집하는 행위"],
            answer: 1,
            explanation: "'robots.txt'는 웹사이트 운영자가 크롤러(수집 봇)에게 수집을 허용하거나 금지하는 페이지를 명시한 국제적인 규약입니다. 이를 무시하고 과도하게 데이터를 수집하는 행위는 웹사이트 서버에 부하를 주어 업무 방해에 해당할 수 있으며, 저작권 침해 등의 법적 문제로 이어질 수 있습니다."
        },
        {
            type: 'mcq',
            question: "존 스노우가 런던 지도 위에 사망자 발생 위치를 점으로 표시하여 패턴을 분석한 행위는 현대의 데이터 과학에서 어떤 활동과 가장 유사한가?",
            options: ["데이터 암호화", "데이터 압축", "데이터 시각화 (Data Visualization)", "데이터베이스 설계", "펌웨어 개발"],
            answer: 2,
            explanation: "지도 위에 데이터를 표시하여 특정 지역(브로드 가 펌프)에 데이터가 집중되는 현상을 한눈에 파악한 것은, 데이터를 그래프나 맵 등으로 표현하여 패턴과 인사이트를 찾는 '데이터 시각화'의 고전적인 사례라고 할 수 있습니다."
        },
        {
            type: 'mcq',
            question: "문제 해결을 위한 데이터 분석 프로젝트를 수행하는 올바른 마음가짐은?",
            options: ["데이터는 항상 정확하므로, 수집된 데이터를 의심 없이 사용한다.", "내가 세운 초기 가설과 데이터 분석 결과가 다르면, 결과를 가설에 맞춰 수정한다.", "데이터 수집부터 분석, 결과 해석까지 전 과정에서 발생 가능한 오류와 편향을 비판적으로 검토한다.", "복잡한 최신 알고리즘을 사용하는 것만이 항상 최고의 결과를 보장한다.", "분석 결과는 나만 알고 있는 것이 가장 가치 있다."],
            answer: 2,
            explanation: "데이터 과학자는 '과학자'로서의 태도를 가져야 합니다. 즉, 데이터와 분석 과정을 끊임없이 의심하고, 객관적인 증거를 찾으며, 자신의 편견이 결과에 영향을 미치지 않도록 경계하는 비판적 사고가 매우 중요합니다."
        }
    ];

    const form = document.getElementById('quizForm');
    let questionCounter = 1;
    let currentSection = '';

    questions.forEach((q, index) => {
        if (q.sectionTitle && currentSection !== q.sectionTitle) {
            currentSection = q.sectionTitle;
            const sectionHeader = document.createElement('h2');
            sectionHeader.textContent = currentSection;
            form.appendChild(sectionHeader);
            questionCounter = 1;
        }

        const questionDiv = document.createElement('div');
        questionDiv.className = 'question';
        questionDiv.id = 'q-container-' + index;

        const questionText = document.createElement('p');
        const cleanQuestionForTTS = q.question.replace(/\n/g, " ");
        questionText.innerHTML = `${questionCounter}. ${q.question} <button type="button" class="tts-button" onclick="speak('${cleanQuestionForTTS}')" title="문제 읽어주기">🔊</button>`;
        questionDiv.appendChild(questionText);

        if (q.type === 'ox') {
            ['O', 'X'].forEach(opt => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'q' + index;
                radio.value = opt;
                label.appendChild(radio);
                label.append(` ${opt}`);
                questionDiv.appendChild(label);
            });
        } else if (q.type === 'mcq') {
            q.options.forEach((opt, optIndex) => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'q' + index;
                radio.value = optIndex;
                label.appendChild(radio);
                label.append(` ${optIndex + 1}. ${opt}`);
                questionDiv.appendChild(label);
            });
        }

        const explanationDiv = document.createElement('div');
        explanationDiv.className = 'explanation';
        explanationDiv.id = 'exp' + index;
        explanationDiv.innerHTML = `<strong>상세 풀이:</strong> ${q.explanation}`;
        questionDiv.appendChild(explanationDiv);

        form.appendChild(questionDiv);
        questionCounter++;
    });

    function gradeAndSubmit(event) {
        event.preventDefault();

        const studentId = document.getElementById('studentId').value.trim();
        const studentName = document.getElementById('studentName').value.trim();

        if (!studentId || !studentName) {
            alert("학번과 이름을 모두 입력해주세요.");
            return;
        }

        let score = 0;
        let resultText = `학생 정보\n학번: ${studentId}\n이름: ${studentName}\n\n`;
        resultText += "========================================\n\n";
        
        let fileQuestionCounter = 1;
        let currentSectionForFile = '';

        questions.forEach((q, index) => {
            if (q.sectionTitle && currentSectionForFile !== q.sectionTitle) {
                currentSectionForFile = q.sectionTitle;
                if (index > 0) resultText += "\n========================================\n\n";
                resultText += `${currentSectionForFile}\n\n`;
                fileQuestionCounter = 1;
            }

            const container = document.getElementById('q-container-' + index);
            const explanation = document.getElementById('exp' + index);
            explanation.style.display = 'block';
            
            const selectedRadio = form.elements['q' + index];
            const userAnswer = selectedRadio ? selectedRadio.value : "";
            let isCorrect = false;

            const cleanQuestionForFile = q.question.replace(/\n/g, '\n');

            let userAnswerText = "(미응답)";
            let correctAnswerText = "";

            if (q.type === 'ox') {
                isCorrect = (userAnswer === q.answer);
                userAnswerText = userAnswer ? `선택: ${userAnswer}` : "(미응답)";
                correctAnswerText = `정답: ${q.answer}`;
            } else if (q.type === 'mcq') {
                isCorrect = (userAnswer == q.answer);
                userAnswerText = userAnswer ? `선택: ${parseInt(userAnswer)+1}번. ${q.options[userAnswer]}` : "(미응답)";
                correctAnswerText = `정답: ${q.answer+1}번. ${q.options[q.answer]}`;
            }

            resultText += `${fileQuestionCounter}. ${cleanQuestionForFile}\n`;
            resultText += `${userAnswerText}\n`;

            const labels = container.getElementsByTagName('label');
            const correctLabelIndex = q.type === 'ox' ? (q.answer === 'O' ? 0 : 1) : q.answer;

            if (isCorrect) {
                score++;
                resultText += "결과: 정답 (O)\n";
                if(userAnswer !== "") {
                   const selectedLabelIndex = q.type === 'ox' ? (userAnswer === 'O' ? 0 : 1) : parseInt(userAnswer);
                   labels[selectedLabelIndex].classList.add('correct');
                }
            } else {
                resultText += "결과: 오답 (X)\n";
                resultText += `${correctAnswerText}\n`;
                if(userAnswer !== "") {
                    const selectedLabelIndex = q.type === 'ox' ? (userAnswer === 'O' ? 0 : 1) : parseInt(userAnswer);
                    if(labels[selectedLabelIndex]) labels[selectedLabelIndex].classList.add('incorrect');
                }
                const correctLabel = labels[correctLabelIndex];
                if(correctLabel) {
                    correctLabel.classList.add('correct');
                    correctLabel.innerHTML += ' <span class="correct-answer-highlight">&lt;-- 정답</span>';
                }
            }

            resultText += `상세 풀이: ${q.explanation}\n\n`;
            fileQuestionCounter++;
        });

        const totalQuestions = questions.length;
        const finalScore = Math.round((score / totalQuestions) * 100);

        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `채점이 완료되었습니다. 총 ${totalQuestions}문제 중 ${score}문제를 맞추셨습니다. (점수: ${finalScore}점)`;
        resultDiv.classList.add(finalScore >= 60 ? 'correct' : 'incorrect');

        const now = new Date();
        const timestamp = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2, '0')}${now.getDate().toString().padStart(2, '0')}_${now.getHours().toString().padStart(2, '0')}${now.getMinutes().toString().padStart(2, '0')}`;
        
        const filename = `${studentId}_${studentName}_${finalScore}점_${timestamp}.txt`;
        
        const fileHeaderText = `채점 결과\n총점: ${finalScore}점 (${totalQuestions}문제 중 ${score}문제 정답)\n응시 시각: ${now.toLocaleString('ko-KR')}\n\n`;
        resultText = fileHeaderText + resultText;

        const blob = new Blob([resultText], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').textContent = "채점 완료 (결과 파일 다운로드됨)";
        const formInputs = form.getElementsByTagName('input');
        for(let i = 0; i < formInputs.length; i++) {
            formInputs[i].disabled = true;
        }
        window.scrollTo(0, 0);
    }
</script>
