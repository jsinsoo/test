<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>312. 문제와 문제 해결 절차 평가</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; max-width: 900px; margin: 20px auto; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #1a73e8; text-align: center; }
        h2 { border-left: 5px solid #1a73e8; padding-left: 10px; color: #333; margin-top: 30px; }
        .question-box { margin-bottom: 25px; padding: 15px; border-bottom: 1px solid #eee; }
        .options label { display: block; cursor: pointer; margin: 8px 0; padding: 8px; border-radius: 5px; transition: background 0.2s; }
        .options label:hover { background: #e8f0fe; }
        .info-section { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; }
        input[type="text"] { padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; width: 200px; }
        button { display: block; width: 100%; padding: 18px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 20px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1557b0; }
        #resultArea { display: none; margin-top: 30px; }
        .explanation { margin-top: 10px; padding: 10px; background: #f8f9fa; border-radius: 5px; font-size: 0.95em; color: #555; display: none; }
        .correct { color: #28a745; font-weight: bold; }
        .wrong { color: #dc3545; font-weight: bold; }
        code { background: #eee; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>

<h1>Ⅲ. 문제와 문제 해결 절차 평가</h1>

<div class="card info-section">
    <input type="text" id="stdId" placeholder="학번">
    <input type="text" id="stdName" placeholder="이름">
</div>

<div class="card">
    <h2>1. 진단평가 (OX 퀴즈)</h2>
    <div id="ox-container"></div>
</div>

<div class="card">
    <h2>2. 형성평가 (5지 선다형)</h2>
    <div id="multi-container"></div>
</div>

<button onclick="calculateScore()">평가 완료 및 결과 보기</button>

<div id="resultArea" class="card">
    <h2 id="scoreDisplay"></h2>
    <div id="detailedReview"></div>
    <button onclick="downloadResult()" style="background: #34a853; margin-top: 20px;">결과 파일(.txt) 저장</button>
</div>

<script>
const oxQuestions = [
    { q: "알고리즘은 반드시 컴퓨터 프로그램으로 작성되어야만 한다.", a: "X", e: "알고리즘은 생각의 절차이며, 요리 레시피나 길 찾기처럼 일상생활의 다양한 형태로 존재할 수 있습니다." },
    { q: "의사코드(Pseudocode)는 특정 프로그래밍 언어의 문법을 엄격히 지켜야 한다.", a: "X", e: "의사코드는 자연어와 유사하게 논리적 흐름을 표현하는 것이 목적이며 문법적 엄격함보다는 명확성이 중요합니다." },
    { q: "좋은 알고리즘은 어떤 경우에도 유한한 시간 안에 반드시 종료되어야 한다.", a: "O", e: "이는 '유한성' 조건으로, 무한히 반복되어 종료되지 않는 절차는 알고리즘이 아닙니다." },
    { q: "'문제 분해'는 하나의 큰 문제를 여러 개의 작은 함수로 나누어 코딩하는 기술이다.", a: "X", e: "문제 분해는 코딩 이전의 '사고 과정'으로, 복잡한 문제를 관리하기 쉬운 단위로 나누어 생각하는 것입니다." },
    { q: "알고리즘의 효율성은 주로 '최악의 경우(Worst Case)'를 기준으로 평가한다.", a: "O", e: "성능 보장을 위해 데이터 크기에 따른 최악의 실행 시간을 Big-O 표기법으로 평가합니다." },
    { q: "유클리드 호제법은 두 수의 최소공배수를 찾는 알고리즘이다.", a: "X", e: "유클리드 호제법은 두 수의 '최대공약수(GCD)'를 찾는 효율적인 알고리즘입니다." },
    { q: "알고리즘의 각 단계는 누가 보더라도 모호하지 않고 명확해야 한다.", a: "O", e: "이는 '명확성' 조건으로, 단계마다 여러 가지로 해석될 여지가 없어야 합니다." },
    { q: "'선형 탐색'은 정렬되지 않은 리스트에서도 원하는 값을 찾을 수 있다.", a: "O", e: "처음부터 끝까지 하나씩 확인하므로 정렬 여부와 상관없이 사용 가능합니다." },
    { q: "알고리즘과 프로그램은 완전히 동일한 개념이다.", a: "X", e: "알고리즘은 '방법/아이디어'이고, 프로그램은 이를 특정 언어로 '구현'한 실체입니다." },
    { q: "알고리즘을 설계하는 가장 중요한 이유는 코드의 줄 수를 줄이기 위해서이다.", a: "X", e: "가장 중요한 이유는 문제를 '정확하고 효율적으로' 해결하기 위해서입니다." }
];

const multiQuestions = [
    { q: "알고리즘에 대한 정의로 가장 적절한 것은?", o: ["파이썬 코드 묶음", "문제 해결을 위한 명확하고 단계적인 절차나 규칙의 집합", "하드웨어 제어 명령어", "데이터 자료형", "실행 속도 측정 단위"], a: 2, e: "알고리즘은 특정 기술에 국한되지 않는 논리적 방법론 그 자체입니다." },
    { q: "코딩 전 의사코드를 작성하는 주된 이점은?", o: ["실행 속도 향상", "언어 문법에 얽매이지 않고 논리적 흐름에 집중 가능", "코드 자동 생성", "모든 문법 오류 발견", "메모리 사용량 예측"], a: 2, e: "의사코드는 복잡한 문법 대신 문제 해결 설계에 집중하게 돕는 설계도 역할을 합니다." },
    { q: "좋은 알고리즘의 필수 조건으로 거리가 먼 것은?", o: ["유한성", "명확성", "다양성(언어 구현 가능성)", "유효성", "출력"], a: 3, e: "다양한 언어 구현은 특징일 뿐, 알고리즘이 갖춰야 할 5대 필수 조건은 아닙니다." },
    { q: "리스트에서 가장 큰 값을 찾는 표준 알고리즘 방식은?", o: ["모든 값을 더해 개수로 나눔", "첫 값을 최댓값으로 두고 나머지 값들과 비교하며 갱신", "정렬 후 첫 번째 값 선택", "모든 값 곱하기", "짝홀 판별"], a: 2, e: "상태 변수를 설정하고 반복 비교를 통해 값을 갱신하는 것이 표준적인 최댓값 찾기 방식입니다." },
    { q: "data 내 target의 존재 여부를 리턴하는 코드의 알고리즘은?", o: ["정렬", "최댓값 찾기", "선형 탐색", "평균 계산", "피보나치"], a: 3, e: "데이터를 하나씩 확인하며 목표값과 비교하므로 선형 탐색 알고리즘입니다." },
    { q: "90점 이상 학생 명단을 만드는 문제에서 '문제 분해'로 부적절한 것은?", o: ["점수 목록 순차 확인", "90점 이상 여부 비교", "이름을 리스트에 추가", "학생들의 평균 점수 계산", "최종 리스트 제시"], a: 4, e: "목표가 명단 작성이므로 평균 점수 계산은 문제 해결에 필요하지 않은 별개의 작업입니다." },
    { q: "시간 복잡도(Time Complexity)가 의미하는 바는?", o: ["코드 작성 시간", "사용 메모리 양", "입력 크기에 따른 연산 횟수의 변화율", "이해의 용이성", "답의 정확성"], a: 3, e: "시간 복잡도는 입력 크기(N)에 따른 알고리즘의 실행 효율성을 나타내는 척도입니다." },
    { q: "sum=0, i=1; while i<=4: sum+=i, i+=1 실행 후 sum은?", o: ["0", "4", "5", "10", "15"], a: 4, e: "1+2+3+4의 합을 구하는 과정으로 최종 sum은 10이 됩니다." },
    { q: "알고리즘의 역할과 가장 유사한 비유는?", o: ["건물의 설계도", "건물의 벽돌", "건물 그 자체", "건물의 주소", "건물 입주민"], a: 1, e: "알고리즘은 문제 해결을 위한 계획이자 설계도입니다." },
    { q: "알고리즘 공부가 프로그래머에게 중요한 이유는?", o: ["문법 암기", "무결점 코드 보장", "문제 해결 능력 함양", "하드웨어 제작", "타이핑 속도 향상"], a: 3, e: "알고리즘은 체계적 분석과 효율적 해결책을 설계하는 사고의 틀을 길러줍니다." }
];

let globalScore = 0;
let finalReport = "";

function renderQuiz() {
    const oxDiv = document.getElementById('ox-container');
    oxQuestions.forEach((item, i) => {
        oxDiv.innerHTML += `
            <div class="question-box">
                <p><strong>Q${i+1}.</strong> ${item.q}</p>
                <div class="options">
                    <label><input type="radio" name="ox${i}" value="O"> O</label>
                    <label><input type="radio" name="ox${i}" value="X"> X</label>
                </div>
                <div id="ox-ans-${i}" class="explanation"></div>
            </div>`;
    });

    const multiDiv = document.getElementById('multi-container');
    multiQuestions.forEach((item, i) => {
        let opts = '';
        item.o.forEach((opt, idx) => {
            opts += `<label><input type="radio" name="m${i}" value="${idx+1}"> ${idx+1}. ${opt}</label>`;
        });
        multiDiv.innerHTML += `
            <div class="question-box">
                <p><strong>Q${i+1}.</strong> ${item.q}</p>
                <div class="options">${opts}</div>
                <div id="m-ans-${i}" class="explanation"></div>
            </div>`;
    });
}

function calculateScore() {
    const sId = document.getElementById('stdId').value;
    const sName = document.getElementById('stdName').value;
    if(!sId || !sName) return alert("학번과 이름을 먼저 입력해주세요.");

    let score = 0;
    let reviewHtml = "";
    finalReport = `=== 알고리즘 문제 해결 절차 평가 ===\n학번: ${sId} / 이름: ${sName}\n\n`;

    // OX 채점
    finalReport += "[1. 진단평가 OX]\n";
    oxQuestions.forEach((item, i) => {
        const selected = document.querySelector(`input[name="ox${i}"]:checked`)?.value;
        const isCorrect = selected === item.a;
        if(isCorrect) score += 5;
        
        const feedback = document.getElementById(`ox-ans-${i}`);
        feedback.style.display = "block";
        feedback.innerHTML = `<span class="${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '정답' : '오답'}</span> (정답: ${item.a})<br>${item.e}`;
        finalReport += `${i+1}번: ${isCorrect ? '정답' : '오답'} / 풀이: ${item.e}\n`;
    });

    // 멀티 채점
    finalReport += "\n[2. 형성평가 5지선다]\n";
    multiQuestions.forEach((item, i) => {
        const selected = document.querySelector(`input[name="m${i}"]:checked`)?.value;
        const isCorrect = parseInt(selected) === item.a;
        if(isCorrect) score += 5;

        const feedback = document.getElementById(`m-ans-${i}`);
        feedback.style.display = "block";
        feedback.innerHTML = `<span class="${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '정답' : '오답'}</span> (정답: ${item.a}번)<br>${item.e}`;
        finalReport += `${i+1}번: ${isCorrect ? '정답' : '오답'} / 풀이: ${item.e}\n`;
    });

    globalScore = score;
    document.getElementById('scoreDisplay').innerText = `${sName}님의 점수는 ${score}점입니다.`;
    document.getElementById('resultArea').style.display = "block";
    window.scrollTo(0, document.body.scrollHeight);
}

function downloadResult() {
    const sId = document.getElementById('stdId').value;
    const sName = document.getElementById('stdName').value;
    const now = new Date();
    const timeStr = `${now.getHours()}시${now.getMinutes()}분`;
    const fileName = `${sId}_${sName}_${globalScore}_312_${timeStr}.txt`;
    
    const blob = new Blob([finalReport + `\n최종 점수: ${globalScore}점`], { type: 'text/plain' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = fileName;
    link.click();
}

renderQuiz();
</script>
</body>
</html>
