<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>331. 자료형 평가 프로그램</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; max-width: 850px; margin: 20px auto; padding: 20px; background-color: #f0f4f8; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 25px; }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        h2 { color: #2980b9; margin-top: 30px; }
        .question-box { margin-bottom: 25px; padding: 18px; border-radius: 8px; background: #fff; border: 1px solid #e1e8ed; }
        .options label { display: block; cursor: pointer; margin: 10px 0; padding: 8px; border-radius: 6px; transition: background 0.3s; }
        .options label:hover { background: #f1f9ff; }
        .input-group { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; }
        input[type="text"] { padding: 12px; border: 2px solid #ced4da; border-radius: 8px; width: 200px; font-size: 16px; }
        button { display: block; width: 100%; padding: 20px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
        .feedback { margin-top: 15px; padding: 15px; border-radius: 6px; display: none; }
        .correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .wrong { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .expl-text { display: block; margin-top: 10px; font-size: 0.95em; color: #555; }
        #result-display { display: none; text-align: center; }
    </style>
</head>
<body>

<h1>Ⅲ. 자료형의 종류와 특성 평가</h1>

<div class="card input-group">
    <input type="text" id="studentNum" placeholder="학번">
    <input type="text" id="studentName" placeholder="이름">
</div>

<div class="card">
    <h2>1. 진단평가 (OX 퀴즈)</h2>
    <div id="ox-container"></div>
</div>

<div class="card">
    <h2>2. 형성평가 (5지 선다형)</h2>
    <div id="multi-container"></div>
</div>

<button onclick="gradeAndShow()">평가 제출 및 결과 확인</button>

<div id="result-display" class="card">
    <h2 id="final-score"></h2>
    <p>응시 결과 상세 내역을 파일로 저장하시겠습니까?</p>
    <button onclick="generateTxtFile()" style="background-color: #27ae60;">결과 파일(.txt) 저장</button>
</div>

<script>
const oxData = [
    { q: "파이썬 리스트(list)의 첫 번째 요소에 접근하려면 my_list[1]을 사용해야 한다.", a: "X", e: "인덱스는 0부터 시작하므로 첫 번째 요소는 my_list[0]입니다." },
    { q: "튜플(tuple)은 한 번 생성되면 그 안의 요소를 바꿀 수 없다.", a: "O", e: "튜플의 핵심 특징은 '불변성(immutability)'입니다." },
    { q: "집합(set)은 중복된 요소를 허용하지 않으며, 순서가 없다.", a: "O", e: "유일성과 비순서성이 집합의 두 가지 핵심 특징입니다." },
    { q: "딕셔너리(dictionary)의 값(value)으로 리스트나 다른 딕셔너리를 사용할 수 있다.", a: "O", e: "딕셔너리의 값에는 타입 제약이 없어 복잡한 구조도 저장 가능합니다." },
    { q: "my_list.append('new') 코드는 리스트의 맨 처음에 'new'를 추가한다.", a: "X", e: "append()는 항상 리스트의 '맨 마지막'에 요소를 추가합니다." },
    { q: "my_dict = {} 코드는 비어있는 집합(set)을 만든다.", a: "X", e: "{}는 비어있는 '딕셔너리'를 만듭니다. 집합은 set()을 사용해야 합니다." },
    { q: "딕셔너리의 키(key)로는 리스트를 사용할 수 있다.", a: "X", e: "키는 반드시 '불변(immutable)' 타입이어야 하므로 수정 가능한 리스트는 사용 불가합니다." },
    { q: "t = 1, 2, 3 코드는 t를 튜플로 만든다.", a: "O", e: "쉼표로 구분된 값들을 할당할 때 자동으로 튜플로 묶이는 '튜플 패킹'이 발생합니다." },
    { q: "'key1' in my_dict 코드는 my_dict에 'key1'이라는 '값(value)'이 있는지 확인한다.", a: "X", e: "in 키워드는 기본적으로 '키(key)'의 존재 여부를 확인합니다." },
    { q: "수정 가능한(mutable) 자료형은 list, dict, set 이다.", a: "O", e: "이 세 가지는 생성 후에도 내용을 변경할 수 있는 수정 가능 자료형입니다." }
];

const multiData = [
    { q: "다음 중 튜플에 대한 설명으로 틀린 것은?", o: ["소괄호 ()로 생성 가능", "인덱싱/슬라이싱 가능", "append()로 요소 추가 가능", "순서가 있는 자료구조", "불변 객체"], a: 3, e: "튜플은 불변이므로 요소를 추가하는 append() 메서드가 없습니다." },
    { q: "my_set = {1, 2, 3, 3, 2, 1} 실행 후 len(my_set)의 값은?", o: ["6", "5", "4", "3", "1"], a: 4, e: "집합은 중복을 허용하지 않아 유일한 값인 {1, 2, 3}만 남아 길이가 3이 됩니다." },
    { q: "a = {1, 2, 3, 4}, b = {3, 4, 5, 6} 일 때, a & b의 결과는?", o: ["{1..6}", "{1, 2}", "{5, 6}", "{3, 4}", "{1, 2, 5, 6}"], a: 4, e: "& 연산자는 두 집합의 '교집합'인 {3, 4}를 구합니다." },
    { q: "리스트의 중복을 제거하는 가장 파이썬다운 방법은?", o: ["for문으로 하나씩 확인", "list(set(리스트)) 사용", "tuple() 변환", "remove_duplicates()", "sort() 사용"], a: 2, e: "set으로 변환하여 중복을 없앤 후 다시 리스트로 감싸는 것이 가장 간편합니다." },
    { q: "my_data[0] = 100 코드 실행 시 TypeError가 발생했다면, 이 자료형은?", o: ["리스트", "튜플", "정수", "딕셔너리", "불리언"], a: 2, e: "인덱스로 접근해 값을 바꾸려 할 때 에러가 나면 '불변' 타입인 튜플일 가능성이 높습니다." },
    { q: "s1 = {'a', 'b'}, s2 = {'b', 'c'} 일 때, s1 - s2의 결과는?", o: ["{'a'}", "{'c'}", "{'b'}", "{'a', 'c'}", "{}"], a: 1, e: "차집합 연산으로 s1에는 있지만 s2에는 없는 'a'만 남습니다." },
    { q: "튜플을 사용하기에 가장 적합한 데이터는?", o: ["학생 이름 목록", "오늘의 할 일", "좌표값 (x, y)", "쇼핑 장바구니", "게임 점수 순위"], a: 3, e: "좌표와 같이 변경될 필요가 없는 고정된 데이터 묶음에 튜플이 적합합니다." },
    { q: "딕셔너리에서 모든 '키'들만 모아서 반환하는 메서드는?", o: ["keys()", "values()", "items()", "get()", "pop()"], a: 1, e: "keys() 메서드는 딕셔너리의 모든 키를 뷰 객체 형태로 반환합니다." },
    { q: "자료형과 특징의 연결이 잘못된 것은?", o: ["리스트-순서있음", "튜플-수정불가", "집합-중복허용", "딕셔너리-키-값 쌍", "문자열-불변"], a: 3, e: "집합(set)은 중복된 요소를 절대 허용하지 않습니다." },
    { q: "my_list[1:3]이 의미하는 범위로 옳은 것은?", o: ["1번부터 3번까지", "1번부터 2번까지", "0번부터 3번까지", "1번부터 끝까지", "처음부터 3번까지"], a: 2, e: "슬라이싱 [시작:끝]은 '시작' 인덱스부터 '끝-1' 인덱스까지를 의미합니다." }
];

let totalScore = 0;
let fullReport = "";

function render() {
    const oxBox = document.getElementById('ox-container');
    oxData.forEach((item, i) => {
        oxBox.innerHTML += `<div class="question-box"><p><strong>${i+1}.</strong> ${item.q}</p>
            <div class="options"><label><input type="radio" name="ox${i}" value="O"> O</label>
            <label><input type="radio" name="ox${i}" value="X"> X</label></div>
            <div id="ox-fb${i}" class="feedback"></div></div>`;
    });

    const multiBox = document.getElementById('multi-container');
    multiData.forEach((item, i) => {
        let opts = item.o.map((o, idx) => `<label><input type="radio" name="m${i}" value="${idx+1}"> ${idx+1}. ${o}</label>`).join('');
        multiBox.innerHTML += `<div class="question-box"><p><strong>${i+1}.</strong> ${item.q}</p>
            <div class="options">${opts}</div>
            <div id="m-fb${i}" class="feedback"></div></div>`;
    });
}

function gradeAndShow() {
    const num = document.getElementById('studentNum').value;
    const name = document.getElementById('studentName').value;
    if(!num || !name) return alert("학번과 이름을 모두 입력해 주세요.");

    let score = 0;
    fullReport = `[331 자료형 평가 결과 보고서]\n성명: ${name} / 학번: ${num}\n\n`;

    oxData.forEach((item, i) => {
        const sel = document.querySelector(`input[name="ox${i}"]:checked`)?.value;
        const correct = sel === item.a;
        if(correct) score += 5;
        const fb = document.getElementById(`ox-fb${i}`);
        fb.style.display = "block";
        fb.className = "feedback " + (correct ? "correct" : "wrong");
        fb.innerHTML = `<strong>${correct ? '정답' : '오답'}</strong> (정답: ${item.a})<span class="expl-text">${item.e}</span>`;
        fullReport += `OX ${i+1}번: ${correct ? 'O' : 'X'} (정답: ${item.a}) - ${item.e}\n`;
    });

    multiData.forEach((item, i) => {
        const sel = document.querySelector(`input[name="m${i}"]:checked`)?.value;
        const correct = parseInt(sel) === item.a;
        if(correct) score += 5;
        const fb = document.getElementById(`m-fb${i}`);
        fb.style.display = "block";
        fb.className = "feedback " + (correct ? "correct" : "wrong");
        fb.innerHTML = `<strong>${correct ? '정답' : '오답'}</strong> (정답: ${item.a}번)<span class="expl-text">${item.e}</span>`;
        fullReport += `선다 ${i+1}번: ${correct ? 'O' : 'X'} (정답: ${item.a}번) - ${item.e}\n`;
    });

    totalScore = score;
    fullReport += `\n최종 점수: ${score}점`;
    document.getElementById('final-score').innerText = `최종 점수: ${score}점 / 100점`;
    document.getElementById('result-display').style.display = "block";
    window.scrollTo(0, document.body.scrollHeight);
}

function generateTxtFile() {
    const num = document.getElementById('studentNum').value;
    const name = document.getElementById('studentName').value;
    const now = new Date();
    const timeStr = `${now.getHours()}시${now.getMinutes()}분`;
    const fileName = `${num}_${name}_${totalScore}_331_${timeStr}.txt`;
    
    const blob = new Blob([fullReport], { type: "text/plain;charset=utf-8" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = fileName;
    link.click();
}

render();
</script>
</body>
</html>
