<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사물 인터넷의 개념 평가</title>
    <style>
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            line-height: 1.7;
            margin: 20px;
            background-color: #f8f9fa;
            color: #212529;
        }
        .container {
            max-width: 850px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 1px solid #dee2e6;
        }
        h1, h2 {
            color: #0056b3;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
            margin-top: 25px;
        }
        h1 { margin-top: 0; }
        .info-input {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            background-color: #f1f3f5;
            display: flex;
            align-items: center;
        }
        .info-input label {
            margin-right: 10px;
            font-weight: bold;
        }
        .info-input input {
            padding: 8px;
            border: 1px solid #adb5bd;
            border-radius: 5px;
            margin-right: 20px;
        }
        .question {
            margin-bottom: 25px;
            padding: 20px;
            border-left: 5px solid #007bff;
            background-color: #fdfdff;
            border-radius: 0 8px 8px 0;
            border: 1px solid #e0e0e0;
            border-left-width: 5px;

        }
        .question p {
            font-size: 1.15em;
            font-weight: bold;
            margin: 0 0 15px 0;
        }
        .question label {
            display: block;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            border: 1px solid #f0f0f0;
        }
        .question label:hover {
            background-color: #e9ecef;
        }
        .explanation {
            margin-top: 15px;
            padding: 12px;
            border-radius: 5px;
            background-color: #e7f3fe;
            border: 1px solid #bce0fd;
            display: none; /* Initially hidden */
            font-size: 0.95em;
        }
        #submitBtn {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.25em;
            font-weight: bold;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin-top: 30px;
        }
        #submitBtn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        #result {
            margin-top: 25px;
            padding: 20px;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
        }
        .correct {
            background-color: #d1e7dd !important;
            border-color: #a3cfbb !important;
            font-weight: bold;
        }
        .incorrect {
            background-color: #f8d7da !important;
            border-color: #f1aeb5 !important;
        }
        .correct-answer {
            font-weight: bold;
            color: #0a58ca;
        }
        .tts-button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2em;
            margin-left: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>사물 인터넷(IoT)의 개념 평가</h1>

    <div class="info-input">
        <label for="studentId">학번:</label>
        <input type="text" id="studentId" placeholder="학번 입력">
        <label for="studentName">이름:</label>
        <input type="text" id="studentName" placeholder="이름 입력">
    </div>

    <form id="quizForm">
        <!-- Questions will be dynamically inserted here -->
    </form>
    
    <button id="submitBtn" onclick="gradeAndSubmit(event)">제출 및 채점</button>

    <div id="result"></div>
</div>

<script>
    const synth = window.speechSynthesis;
    function speak(text) {
        if (synth.speaking) {
            synth.cancel();
        }
        const utterThis = new SpeechSynthesisUtterance(text);
        utterThis.lang = 'ko-KR';
        synth.speak(utterThis);
    }

    const questions = [
        {
            type: 'ox',
            sectionTitle: "I. 진단평가 (OX 퀴즈)",
            question: "사물 인터넷(IoT)이란 컴퓨터와 스마트폰만을 인터넷에 연결하는 기술을 의미한다.",
            answer: "X",
            explanation: "사물 인터넷은 컴퓨터나 스마트폰뿐만 아니라, 기존에 인터넷 기능이 없던 전구, 시계, 자동차, 화분 등 모든 종류의 '사물'을 인터넷에 연결하는 기술입니다."
        },
        {
            type: 'ox',
            question: "온도 센서는 주변 환경의 물리적 정보를 디지털 데이터로 변환하는 역할을 한다.",
            answer: "O",
            explanation: "센서는 온도, 빛, 압력 등 아날로그 형태의 물리적 환경 정보를 컴퓨터가 이해할 수 있는 디지털 신호(데이터)로 바꾸는 장치입니다."
        },
        {
            type: 'ox',
            question: "액추에이터(Actuator)는 데이터를 수집하는 장치이다.",
            answer: "X",
            explanation: "데이터를 수집하는 장치는 '센서'입니다. 액추에이터는 제어 신호를 받아 모터를 돌리거나 불을 켜는 등 실제 '동작'을 수행하는 장치입니다."
        },
        {
            type: 'ox',
            question: "사물 인터넷 기기는 항상 인간의 직접적인 조작이 있어야만 동작한다.",
            answer: "X",
            explanation: "사물 인터넷의 핵심 특징 중 하나는 인간의 개입 없이, 사물들이 센서 데이터에 기반하여 스스로 상황을 판단하고 자동으로 동작하는 것입니다. (예: 어두워지면 저절로 켜지는 가로등)"
        },
        {
            type: 'ox',
            question: "IoT 시스템에서 수집된 방대한 데이터는 주로 클라우드 플랫폼에서 저장되고 분석된다.",
            answer: "O",
            explanation: "수많은 기기로부터 오는 데이터를 개별 기기가 처리하기는 어렵습니다. 따라서 강력한 연산 능력과 저장 공간을 가진 클라우드 서버로 데이터를 보내 처리하고 분석하는 것이 일반적입니다."
        },
        {
            type: 'ox',
            question: "스마트 홈은 사물 인터넷 기술의 대표적인 응용 분야 중 하나이다.",
            answer: "O",
            explanation: "스마트 홈은 조명, 냉난방, 가전제품, 보안 장치 등 집 안의 각종 사물들을 인터넷으로 연결하여 자동화하고 원격으로 제어하는 시스템으로, IoT의 대표적인 사례입니다."
        },
        {
            type: 'ox',
            question: "IoT 환경에서는 모든 기기가 인터넷에 연결되므로 보안 문제가 중요하게 다루어진다.",
            answer: "O",
            explanation: "집 안의 카메라, 도어락 등 민감한 기기들이 인터넷에 연결되기 때문에, 해킹을 당할 경우 심각한 사생활 침해나 안전 문제가 발생할 수 있습니다. 따라서 보안은 IoT에서 매우 중요한 요소입니다."
        },
        {
            type: 'ox',
            question: "블루투스나 Wi-Fi는 사물 인터넷 기기를 네트워크에 연결하는 데 사용될 수 있다.",
            answer: "O",
            explanation: "IoT 기기는 데이터를 전송하기 위해 다양한 유무선 통신 기술을 사용하며, Wi-Fi, 블루투스, LTE, 5G 등은 모두 여기에 포함됩니다."
        },
        {
            type: 'ox',
            question: "사물 인터넷의 '사물(Things)'은 반드시 전기를 사용하는 전자제품이어야 한다.",
            answer: "X",
            explanation: "'사물'은 어떤 것이든 될 수 있습니다. 예를 들어, 흙에 꽂는 토양 습도 센서나, 가축의 귀에 부착하는 건강 상태 태그처럼 전통적인 전자제품이 아닌 것들도 센서와 통신 기능만 부여하면 IoT의 '사물'이 될 수 있습니다."
        },
        {
            type: 'ox',
            question: "액추에이터는 인간의 '오감'에, 센서는 인간의 '근육'에 비유할 수 있다.",
            answer: "X",
            explanation: "반대로 비유되었습니다. 주변 정보를 받아들이는 센서가 인간의 '오감'에, 신호를 받아 움직이는 액추에이터가 인간의 '근육'이나 '손/발'에 해당합니다."
        },
        {
            type: 'mcq',
            sectionTitle: "II. 형성평가 (5지선다형)",
            question: "다음 중 사물 인터넷(IoT)의 핵심 구성 요소로 가장 거리가 먼 것은?",
            options: ["센서 (Sensor)", "액추에이터 (Actuator)", "운영체제 (Operating System)", "연결성 (Connectivity)", "데이터 처리 플랫폼 (Platform)"],
            answer: 2,
            explanation: "IoT 장치에 간단한 운영체제(임베디드 OS 등)가 탑재될 수는 있지만, IoT 시스템 전체를 구성하는 핵심 개념 요소는 아닙니다. IoT의 핵심은 '사물'에 '센서/액추에이터'를 달아 '연결'하여 '플랫폼'에서 데이터를 처리하고 서비스를 만드는 것입니다."
        },
        {
            type: 'mcq',
            question: "스마트 팜에서 토양의 습도를 측정하여 부족하면 자동으로 물을 뿌려주는 시스템이 있다. 여기서 물을 뿌리는 '스프링클러'는 어떤 역할을 하는가?",
            options: ["센서", "액추에이터", "플랫폼", "네트워크", "데이터"],
            answer: 1,
            explanation: "스프링클러는 '물이 부족하다'는 판단(제어 신호)에 따라 '물을 뿌리는' 실제 동작을 수행하므로 액추에이터에 해당합니다. 토양 습도를 측정하는 장치가 센서입니다."
        },
        {
            type: 'mcq',
            question: "사물 인터넷이 기존의 인터넷과 비교하여 갖는 가장 큰 차이점은?",
            options: [
                "유선으로만 연결된다.",
                "연결의 대상이 사람에서 사물로 확장되었다.",
                "오직 정보 검색만을 목적으로 한다.",

            answer: 1,
            explanation: "기존 인터넷은 주로 사람이 컴퓨터나 스마트폰을 사용하여 정보를 생성하고 소비하는 '사람 중심'의 네트워크였습니다. 사물 인터넷은 여기에 더해 각종 사물까지 연결의 주체로 포함시켜 그 범위를 확장한 개념입니다."
        },
        {
            type: 'mcq',
            question: "다음 중 사물 인터넷 기술이 적용된 사례로 보기 어려운 것은?",
            options: ["외출 시 스마트폰 앱으로 집 안의 전등을 끄는 기능", "아기의 체온을 실시간으로 부모의 스마트폰에 전송하는 스마트 기저귀", "인터넷 연결 없이 CD 플레이어로 음악을 듣는 것", "운전자의 졸음을 감지하여 경고음을 울리고 의자를 흔들어주는 자동차 시트", "농장의 온도와 습도에 따라 자동으로 비닐하우스를 여닫는 시스템"],
            answer: 2,
            explanation: "사물 인터넷은 '인터넷 연결'을 통한 데이터 교환이 핵심입니다. 인터넷 연결 없이 독립적으로 동작하는 CD 플레이어는 사물 인터넷 기기라고 할 수 없습니다. 나머지 보기들은 모두 센서, 액추에이터, 네트워크 연결을 포함하는 IoT 사례입니다."
        },
        {
            type: 'mcq',
            question: "IoT 기술이 널리 보급되면서 가장 중요하게 대두되는 사회적, 윤리적 문제점은?",
            options: ["기기들의 전력 소모 증가", "해킹으로 인한 사생활 침해 및 보안 위협", "너무 많은 종류의 기기 출시로 인한 혼란", "오래된 가전제품의 폐기 문제", "통신 요금의 증가"],
            answer: 1,
            explanation: "집 안의 상황을 보여주는 CCTV, 현관문 잠금장치, 개인의 건강 정보 등 매우 민감한 데이터들이 인터넷을 통해 오고 가기 때문에, 만약 이 시스템이 해킹당할 경우 심각한 사생활 침해나 물리적 위협으로 이어질 수 있습니다. 따라서 보안과 프라이버시가 가장 중요한 문제로 꼽힙니다."

        },
        {
            type: 'mcq',
            question: "사물 인터넷의 '사물'이 되기 위한 필수 조건은?",

            options: ["제어 -> 분석 -> 연결 -> 수집", "수집 -> 연결 -> 분석 -> 제어", "분석 -> 수집 -> 제어 -> 연결", "연결 -> 제어 -> 수집 -> 분석", "수집 -> 분석 -> 연결 -> 제어"],
            answer: 1,
            explanation: "IoT의 가장 기본적인 동작 흐름은 다음과 같습니다. 1. 센서가 데이터를 **수집(Sense)**한다. 2. **연결(Connectivity)**을 통해 플랫폼으로 데이터를 보낸다. 3. 플랫폼이 데이터를 **분석(Process)**하고 판단을 내린다. 4. 분석 결과에 따라 액추에이터를 **제어(Act)**하여 동작시킨다."
        }
    ];

    const form = document.getElementById('quizForm');
    let questionCounter = 1;
    let currentSection = '';

    questions.forEach((q, index) => {
        if (q.sectionTitle && currentSection !== q.sectionTitle) {
            currentSection = q.sectionTitle;
            const sectionHeader = document.createElement('h2');
            sectionHeader.textContent = currentSection;
            form.appendChild(sectionHeader);
            questionCounter = 1;
        }

        const questionDiv = document.createElement('div');
        questionDiv.className = 'question';
        questionDiv.id = 'q-container-' + index;

        const questionText = document.createElement('p');
        questionText.innerHTML = `${questionCounter}. ${q.question} <button type="button" class="tts-button" onclick="speak('${q.question}')" title="문제 읽어주기">🔊</button>`;
        questionDiv.appendChild(questionText);

        if (q.type === 'ox') {
            ['O', 'X'].forEach(opt => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'q' + index;
                radio.value = opt;
                label.appendChild(radio);
                label.append(` ${opt}`);
                questionDiv.appendChild(label);
            });
        } else if (q.type === 'mcq') {
            q.options.forEach((opt, optIndex) => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'q' + index;
                radio.value = optIndex;
                label.appendChild(radio);
                label.append(` ${optIndex + 1}. ${opt}`);
                questionDiv.appendChild(label);
            });
        }

        const explanationDiv = document.createElement('div');
        explanationDiv.className = 'explanation';
        explanationDiv.id = 'exp' + index;
        explanationDiv.innerHTML = `<strong>상세 풀이:</strong> ${q.explanation}`;
        questionDiv.appendChild(explanationDiv);

        form.appendChild(questionDiv);
        questionCounter++;
    });

    function gradeAndSubmit(event) {
        event.preventDefault();

        const studentId = document.getElementById('studentId').value.trim();
        const studentName = document.getElementById('studentName').value.trim();

        if (!studentId || !studentName) {
            alert("학번과 이름을 모두 입력해주세요.");
            return;
        }

        let score = 0;
        let resultText = `학생 정보\n학번: ${studentId}\n이름: ${studentName}\n\n`;
        resultText += "========================================\n\n";
        
        let fileQuestionCounter = 1;
        let currentSectionForFile = '';

        questions.forEach((q, index) => {
            if (q.sectionTitle && currentSectionForFile !== q.sectionTitle) {
                currentSectionForFile = q.sectionTitle;
                if (index > 0) resultText += "\n========================================\n\n";
                resultText += `${currentSectionForFile}\n\n`;
                fileQuestionCounter = 1;
            }

            const container = document.getElementById('q-container-' + index);
            const explanation = document.getElementById('exp' + index);
            explanation.style.display = 'block';
            
            const selectedRadio = form.elements['q' + index];
            const userAnswer = selectedRadio ? selectedRadio.value : "";
            let isCorrect = false;

            let userAnswerText = "(미응답)";
            let correctAnswerText = "";

            if (q.type === 'ox') {
                isCorrect = (userAnswer === q.answer);
                userAnswerText = userAnswer ? `선택: ${userAnswer}` : "(미응답)";
                correctAnswerText = `정답: ${q.answer}`;
            } else if (q.type === 'mcq') {
                isCorrect = (userAnswer == q.answer);
                userAnswerText = userAnswer ? `선택: ${parseInt(userAnswer)+1}번. ${q.options[userAnswer]}` : "(미응답)";
                correctAnswerText = `정답: ${q.answer+1}번. ${q.options[q.answer]}`;
            }

            resultText += `${fileQuestionCounter}. ${q.question}\n`;
            resultText += `${userAnswerText}\n`;

            const labels = container.getElementsByTagName('label');

            if (isCorrect) {
                score++;
                resultText += "결과: 정답 (O)\n";
                if(userAnswer !== "") {
                   const selectedLabelIndex = q.type === 'ox' ? (userAnswer === 'O' ? 0 : 1) : parseInt(userAnswer);
                   labels[selectedLabelIndex].classList.add('correct');
                }
            } else {
                resultText += "결과: 오답 (X)\n";
                resultText += `${correctAnswerText}\n`;
                if(userAnswer !== "") {
                    const selectedLabelIndex = q.type === 'ox' ? (userAnswer === 'O' ? 0 : 1) : parseInt(userAnswer);
                    if(labels[selectedLabelIndex]) labels[selectedLabelIndex].classList.add('incorrect');
                }
                const correctLabelIndex = q.type === 'ox' ? (q.answer === 'O' ? 0 : 1) : q.answer;
                const correctLabel = labels[correctLabelIndex];
                if(correctLabel) {
                    correctLabel.classList.add('correct');
                    correctLabel.innerHTML += ' <span class="correct-answer"> &lt;-- 정답</span>';
                }
            }

            resultText += `상세 풀이: ${q.explanation}\n\n`;
            fileQuestionCounter++;
        });

        const totalQuestions = questions.length;
        const finalScore = Math.round((score / totalQuestions) * 100);

        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `채점이 완료되었습니다. 총 ${totalQuestions}문제 중 ${score}문제를 맞추셨습니다. (점수: ${finalScore}점)`;
        resultDiv.classList.add(finalScore >= 60 ? 'correct' : 'incorrect');

        const now = new Date();
        const timestamp = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2, '0')}${now.getDate().toString().padStart(2, '0')}_${now.getHours().toString().padStart(2, '0')}${now.getMinutes().toString().padStart(2, '0')}`;
        const filename = `${studentId}_${studentName}_121_${finalScore}점_${timestamp}.txt`;
        
        resultText = `채점 결과\n총점: ${finalScore}점 (${totalQuestions}문제 중 ${score}문제 정답)\n응시 시각: ${now.toLocaleString('ko-KR')}\n\n` + resultText;

        const blob = new Blob([resultText], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').textContent = "채점 완료 (결과 파일 다운로드됨)";
        const formInputs = form.getElementsByTagName('input');
        for(let i = 0; i < formInputs.length; i++) {
            formInputs[i].disabled = true;
        }
        window.scrollTo(0, 0);
    }
</script>
