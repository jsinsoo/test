<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>암호화의 이해 종합 평가</title>
    <style>
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            line-height: 1.7;
            margin: 20px;
            background-color: #f8f9fa;
            color: #212529;
        }
        .container {
            max-width: 850px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 1px solid #dee2e6;
        }
        h1, h2 {
            color: #0056b3;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
            margin-top: 25px;
        }
        h1 { margin-top: 0; }
        .info-input {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            background-color: #f1f3f5;
            display: flex;
            align-items: center;
        }
        .info-input label {
            margin-right: 10px;
            font-weight: bold;
        }
        .info-input input {
            padding: 8px;
            border: 1px solid #adb5bd;
            border-radius: 5px;
            margin-right: 20px;
        }
        .question {
            margin-bottom: 25px;
            padding: 20px;
            border-left: 5px solid #007bff;
            background-color: #fdfdff;
            border-radius: 0 8px 8px 0;
            border: 1px solid #e0e0e0;
            border-left-width: 5px;
        }
        .question p {
            font-size: 1.15em;
            font-weight: bold;
            margin: 0 0 15px 0;
            white-space: pre-line;
        }
        .question label {
            display: block;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            border: 1px solid #f0f0f0;
        }
        .question label:hover {
            background-color: #e9ecef;
        }
        .explanation {
            margin-top: 15px;
            padding: 12px;
            border-radius: 5px;
            background-color: #e7f3fe;
            border: 1px solid #bce0fd;
            display: none; /* Initially hidden */
            font-size: 0.95em;
        }
        #submitBtn {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.25em;
            font-weight: bold;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin-top: 30px;
        }
        #submitBtn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        #result {
            margin-top: 25px;
            padding: 20px;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
        }
        .correct {
            background-color: #d1e7dd !important;
            border-color: #a3cfbb !important;
            font-weight: bold;
        }
        .incorrect {
            background-color: #f8d7da !important;
            border-color: #f1aeb5 !important;
        }
        .correct-answer-highlight {
            font-weight: bold;
            color: #0a58ca;
        }
        .tts-button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2em;
            margin-left: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>암호화의 이해 종합 평가</h1>

    <div class="info-input">
        <label for="studentId">학번:</label>
        <input type="text" id="studentId" placeholder="학번 입력">
        <label for="studentName">이름:</label>
        <input type="text" id="studentName" placeholder="이름 입력">
    </div>

    <form id="quizForm">
        <!-- Questions will be dynamically inserted here -->
    </form>
    
    <button id="submitBtn" onclick="gradeAndSubmit(event)">제출 및 채점</button>

    <div id="result"></div>
</div>

<script>
    const synth = window.speechSynthesis;
    function speak(text) {
        if (synth.speaking) {
            synth.cancel();
        }
        const utterThis = new SpeechSynthesisUtterance(text);
        utterThis.lang = 'ko-KR';
        synth.speak(utterThis);
    }

    const questions = [
        {
            type: 'ox',
            sectionTitle: "I. 진단평가 (OX 퀴즈)",
            question: "암호화의 주된 목적은 데이터 전송 속도를 높이는 것이다.",
            answer: "X",
            explanation: "암호화의 주된 목적은 허가되지 않은 사람이 데이터를 알아볼 수 없도록 하여 정보의 '기밀성(Confidentiality)'을 보장하는 것입니다. 암호화 과정 자체는 오히려 약간의 시간 소요를 유발합니다."
        },
        {
            type: 'ox',
            question: "대칭키 암호화 방식은 암호화 키와 복호화 키가 동일하다.",
            answer: "O",
            explanation: "대칭키 방식은 하나의 동일한 비밀 키를 사용하여 암호화와 복호화를 모두 수행합니다."
        },
        {
            type: 'ox',
            question: "비대칭키 암호화에서, 나의 공개키는 다른 사람에게 절대 알려주면 안 된다.",
            answer: "X",
            explanation: "비대칭키(공개키) 방식의 핵심은 공개키를 이름 그대로 누구에게나 '공개'하는 것입니다. 다른 사람이 내 공개키로 메시지를 암호화해서 보내면, 나만이 가진 개인키로 열어볼 수 있습니다. 절대 알려주면 안 되는 것은 '개인키'입니다."
        },
        {
            type: 'ox',
            question: "해시 함수는 암호화된 데이터를 다시 원본으로 복원할 수 있다.",
            answer: "X",
            explanation: "해시 함수는 '단방향(One-way)' 함수입니다. 한 번 해시 값으로 변환되면, 그 결과값만으로는 원본 데이터를 복원할 수 없습니다. 복원이 가능한 것은 '암호화'입니다."
        },
        {
            type: 'ox',
            question: "HTTPS 통신에서는 속도가 빠른 대칭키 암호화와 키 교환이 안전한 비대칭키 암호화가 함께 사용된다.",
            answer: "O",
            explanation: "실제 통신에서는 비대칭키 방식으로 실제 데이터를 암호화할 대칭키(세션 키)를 안전하게 교환하고, 그 후로는 속도가 빠른 대칭키 방식으로 실제 데이터를 암호화하여 통신하는 '하이브리드' 방식을 사용합니다."
        },
        {
            type: 'ox',
            question: "시저 암호는 암호화 키(이동 칸 수)만 알면 쉽게 복호화할 수 있으므로 현대적인 암호 시스템으로는 안전하지 않다.",
            answer: "O",
            explanation: "시저 암호는 키의 경우의 수가 25가지밖에 되지 않아, 컴퓨터를 사용하면 무차별 대입 공격(Brute-force attack)으로 순식간에 해독할 수 있습니다."
        },
        {
            type: 'ox',
            question: "동일한 파일은 해시 함수(예: SHA-256)를 통과할 때마다 다른 해시 값을 가진다.",
            answer: "X",
            explanation: "해시 함수는 '결정성'을 가집니다. 즉, 입력값이 동일하면 항상 동일한 해시 값을 출력합니다. 이 특징 때문에 파일의 무결성 검증이 가능합니다."
        },
        {
            type: 'ox',
            question: "대칭키 암호화의 가장 큰 단점은 암호화 속도가 느리다는 것이다.",
            answer: "X",
            explanation: "대칭키 암호화의 가장 큰 장점 중 하나가 바로 '속도가 빠르다'는 것입니다. 가장 큰 단점은 통신 상대방에게 비밀 키를 안전하게 전달해야 하는 '키 배송 문제'입니다."
        },
        {
            type: 'ox',
            question: "웹사이트에 로그인할 때, 서버는 내가 입력한 비밀번호의 해시 값을 계산하여 데이터베이스에 저장된 해시 값과 비교한다.",
            answer: "O",
            explanation: "안전한 시스템은 비밀번호 원문을 저장하지 않습니다. 회원가입 시 비밀번호의 해시 값을 저장해두고, 로그인 요청이 오면 입력된 비밀번호를 다시 해시 함수로 변환하여 저장된 값과 일치하는지를 비교하는 방식으로 인증을 수행합니다."
        },
        {
            type: 'ox',
            question: "비대칭키 암호화에서, 나의 개인키로 암호화한 데이터는 나의 공개키로만 복호화할 수 있다.",
            answer: "O",
            explanation: "이 원리는 '전자 서명(Digital Signature)'에 사용됩니다. 내가 개인키로 암호화했다는 것은 나만이 할 수 있는 행위이므로, 그것이 공개키로 풀린다면 그 데이터가 내가 보낸 것이 맞음을 증명(인증, Authentication)하고, 내용이 변조되지 않았음(무결성)을 보장할 수 있습니다."
        },
        {
            type: 'mcq',
            sectionTitle: "II. 형성평가 (5지선다형)",
            question: "앨리스가 밥에게 비밀 메시지를 보내려고 한다. 비대칭키 암호화 방식을 사용할 때, 앨리스가 메시지를 암호화하기 위해 필요한 것은?",
            options: ["앨리스의 공개키", "앨리스의 개인키", "밥의 공개키", "밥의 개인키", "앨리스와 밥이 함께 만든 대칭키"],
            answer: 2,
            explanation: "메시지를 안전하게 받을 사람(밥)의 공개키로 암호화해야, 그 메시지를 오직 밥만이 자신의 개인키로 열어볼 수 있습니다. 따라서 앨리스는 밥의 공개키가 필요합니다."
        },
        {
            type: 'mcq',
            question: "다음 중 암호화(Encryption)와 해시(Hash)의 가장 근본적인 차이점은?",
            options: ["해시는 키가 필요 없지만 암호화는 키가 필요하다.", "해시는 속도가 빠르지만 암호화는 속도가 느리다.", "해시는 결과물의 길이가 고정되지만 암호화는 그렇지 않다.", "암호화는 복호화가 가능하지만 해시는 복원이 불가능하다.", "암호화는 텍스트에만, 해시는 파일에만 사용된다."],
            answer: 3,
            explanation: "가장 본질적인 차이는 '양방향성' 여부입니다. 암호화는 암호화(Encrypt)와 복호화(Decrypt)가 모두 가능한 양방향 프로세스입니다. 반면 해시는 원본으로 되돌릴 수 없는 단방향 프로세스입니다."
        },
        {
            type: 'mcq',
            question: "인터넷에서 대용량 파일을 다운로드한 후, 파일 제공자가 명시한 'SHA-256 체크섬(Checksum)' 값과 내가 받은 파일의 해시 값을 비교하는 이유는?",
            options: ["파일의 소유권을 증명하기 위해", "파일의 압축을 해제하기 위해", "파일이 다운로드 과정에서 손상되거나 변조되지 않았는지(무결성) 확인하기 위해", "파일에 악성코드가 포함되어 있는지 검사하기 위해", "파일을 암호화하기 위해"],
            answer: 2,
            explanation: "해시 함수는 입력이 조금이라도 다르면 결과가 완전히 달라집니다. 따라서 원본 파일의 해시 값과 다운로드한 파일의 해시 값이 일치한다면, 두 파일의 내용이 1비트의 오차도 없이 동일하다는 것을 수학적으로 증명할 수 있습니다. 이를 '무결성 검증'이라고 합니다."
        },
        {
            type: 'mcq',
            question: "A와 B가 대칭키 암호 방식으로 통신하기로 했다. 그런데 A가 B에게 비밀 키를 전달하는 과정에서 해커가 그 키를 훔쳐보았다. 이로 인해 발생할 수 있는 가장 심각한 문제는?",
            options: ["A와 B의 통신 속도가 느려진다.", "A와 B는 서로에게 메시지를 보낼 수 없게 된다.", "해커가 A와 B 사이에 오고 가는 모든 암호문을 해독할 수 있다.", "해커가 A와 B의 개인키를 알아낼 수 있다.", "A와 B의 컴퓨터에 바이러스가 감염된다."],
            answer: 2,
            explanation: "대칭키 방식은 암호화와 복호화에 동일한 키를 사용하므로, 키가 노출되었다는 것은 암호 시스템 전체가 무너졌다는 의미입니다. 해커는 훔친 키를 이용해 A와 B가 주고받는 모든 암호문을 평문으로 복호화하여 엿볼 수 있습니다."
        },
        {
            type: 'mcq',
            question: "다음 중 비대칭키 암호 시스템의 공개키(Public Key)에 대한 비유로 가장 적절한 것은?",
            options: ["누구나 편지를 넣을 수는 있지만, 주인만 열 수 있는 우체통의 투입구", "나만 가지고 있는 비밀 일기장의 열쇠", "집 주소와 내 이름이 모두 적힌 신분증", "내용물을 갈아서 가루로 만들어버리는 믹서기", "두 사람이 똑같이 나눠 가진 금고 열쇠 중 하나"],
            answer: 0,
            explanation: "공개키는 누구나 사용하여 메시지를 '암호화'(편지를 우체통에 넣는 행위)할 수 있지만, 그렇게 암호화된 메시지는 오직 그에 맞는 개인키(우체통 열쇠)를 가진 주인만이 '복호화'(편지를 꺼내 읽는 행위)할 수 있습니다. ②, ⑤는 대칭키, ④는 해시 함수에 대한 비유입니다."
        },
        {
            type: 'mcq',
            question: "\"HELLO\" 라는 평문을 시저 암호(key=3)로 암호화했을 때의 결과는?",
            options: ["EBIIL", "KHOOR", "GDKKN", "IFMMP", "OLLEH"],
            answer: 1,
            explanation: "각 알파벳을 오른쪽으로 3칸씩 이동시키면 됩니다. H → I → J → K, E → F → G → H, L → M → N → O, O → P → Q → R. 따라서 'KHOOR'가 됩니다."
        },
        {
            type: 'mcq',

        },
        {
            type: 'mcq',
            question: "다음 중 암호화의 핵심 4요소에 포함되지 않는 것은?",

            answer: 4,
            explanation: "평문, 암호문, 키, 알고리즘은 암호화를 구성하는 가장 기본적인 4가지 요소입니다. 프로토콜은 암호 기술을 포함한 여러 기술을 사용하여 통신을 하는 '절차'나 '규약'으로, 암호화 자체의 구성 요소라기보다는 암호화가 사용되는 더 큰 개념입니다."
        },
        {
            type: 'mcq',
            question: "RSA, ECC 와 같은 암호 방식은 어디에 속하는가?",
            options: ["대칭키 암호", "비대칭키 암호", "해시 함수", "스트림 암호", "블록 암호"],
            answer: 1,
            explanation: "RSA와 ECC(타원 곡선 암호)는 수학적인 난제를 기반으로 한 대표적인 공개키(비대칭키) 암호 알고리즘입니다."
        },
        {
            type: 'mcq',
            question: "A가 B에게 보낸 이메일이 중간에 변조되지 않았음을 B가 확인하고 싶다. A는 어떤 정보를 이메일에 함께 보내야 하는가?",
            options: ["이메일 원문의 해시 값", "A의 개인키", "B의 공개키", "이메일 원문을 암호화한 대칭키", "이메일 원문의 길이"],
            answer: 0,
            explanation: "A는 이메일 원문의 해시 값을 계산하여 이메일과 함께 보냅니다. B는 이메일을 받은 후, 수신한 원문에 대해 동일한 해시 함수를 적용하여 해시 값을 직접 계산합니다. 이 계산된 해시 값이 A가 보낸 해시 값과 일치하면, 이메일 내용이 중간에 변조되지 않았음(무결성)을 확신할 수 있습니다."
        }
    ];

    const form = document.getElementById('quizForm');
    let questionCounter = 1;
    let currentSection = '';

    questions.forEach((q, index) => {
        if (q.sectionTitle && currentSection !== q.sectionTitle) {
            currentSection = q.sectionTitle;
            const sectionHeader = document.createElement('h2');
            sectionHeader.textContent = currentSection;
            form.appendChild(sectionHeader);
            questionCounter = 1;
        }

        const questionDiv = document.createElement('div');
        questionDiv.className = 'question';
        questionDiv.id = 'q-container-' + index;

        const questionText = document.createElement('p');
        const cleanQuestionForTTS = q.question.replace(/\n/g, " ");
        questionText.innerHTML = `${questionCounter}. ${q.question} <button type="button" class="tts-button" onclick="speak('${cleanQuestionForTTS}')" title="문제 읽어주기">🔊</button>`;
        questionDiv.appendChild(questionText);

        if (q.type === 'ox') {
            ['O', 'X'].forEach(opt => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'q' + index;
                radio.value = opt;
                label.appendChild(radio);
                label.append(` ${opt}`);
                questionDiv.appendChild(label);
            });
        } else if (q.type === 'mcq') {
            q.options.forEach((opt, optIndex) => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'q' + index;
                radio.value = optIndex;
                label.appendChild(radio);
                label.append(` ${optIndex + 1}. ${opt}`);
                questionDiv.appendChild(label);
            });
        }

        const explanationDiv = document.createElement('div');
        explanationDiv.className = 'explanation';
        explanationDiv.id = 'exp' + index;
        explanationDiv.innerHTML = `<strong>상세 풀이:</strong> ${q.explanation}`;
        questionDiv.appendChild(explanationDiv);

        form.appendChild(questionDiv);
        questionCounter++;
    });

    function gradeAndSubmit(event) {
        event.preventDefault();

        const studentId = document.getElementById('studentId').value.trim();
        const studentName = document.getElementById('studentName').value.trim();

        if (!studentId || !studentName) {
            alert("학번과 이름을 모두 입력해주세요.");
            return;
        }

        let score = 0;
        let resultText = `학생 정보\n학번: ${studentId}\n이름: ${studentName}\n\n`;
        resultText += "========================================\n\n";
        
        let fileQuestionCounter = 1;
        let currentSectionForFile = '';

        questions.forEach((q, index) => {
            if (q.sectionTitle && currentSectionForFile !== q.sectionTitle) {
                currentSectionForFile = q.sectionTitle;
                if (index > 0) resultText += "\n========================================\n\n";
                resultText += `${currentSectionForFile}\n\n`;
                fileQuestionCounter = 1;
            }

            const container = document.getElementById('q-container-' + index);
            const explanation = document.getElementById('exp' + index);
            explanation.style.display = 'block';
            
            const selectedRadio = form.elements['q' + index];
            const userAnswer = selectedRadio ? selectedRadio.value : "";
            let isCorrect = false;

            const cleanQuestionForFile = q.question.replace(/\n/g, '\n');

            let userAnswerText = "(미응답)";
            let correctAnswerText = "";

            if (q.type === 'ox') {
                isCorrect = (userAnswer === q.answer);
                userAnswerText = userAnswer ? `선택: ${userAnswer}` : "(미응답)";
                correctAnswerText = `정답: ${q.answer}`;
            } else if (q.type === 'mcq') {
                isCorrect = (userAnswer == q.answer);
                userAnswerText = userAnswer ? `선택: ${parseInt(userAnswer)+1}번. ${q.options[userAnswer]}` : "(미응답)";
                correctAnswerText = `정답: ${q.answer+1}번. ${q.options[q.answer]}`;
            }

            resultText += `${fileQuestionCounter}. ${cleanQuestionForFile}\n`;
            resultText += `${userAnswerText}\n`;

            const labels = container.getElementsByTagName('label');
            const correctLabelIndex = q.type === 'ox' ? (q.answer === 'O' ? 0 : 1) : q.answer;

            if (isCorrect) {
                score++;
                resultText += "결과: 정답 (O)\n";
                if(userAnswer !== "") {
                   const selectedLabelIndex = q.type === 'ox' ? (userAnswer === 'O' ? 0 : 1) : parseInt(userAnswer);
                   labels[selectedLabelIndex].classList.add('correct');
                }
            } else {
                resultText += "결과: 오답 (X)\n";
                resultText += `${correctAnswerText}\n`;
                if(userAnswer !== "") {
                    const selectedLabelIndex = q.type === 'ox' ? (userAnswer === 'O' ? 0 : 1) : parseInt(userAnswer);
                    if(labels[selectedLabelIndex]) labels[selectedLabelIndex].classList.add('incorrect');
                }
                const correctLabel = labels[correctLabelIndex];
                if(correctLabel) {
                    correctLabel.classList.add('correct');
                    correctLabel.innerHTML += ' <span class="correct-answer-highlight">&lt;-- 정답</span>';
                }
            }

            resultText += `상세 풀이: ${q.explanation}\n\n`;
            fileQuestionCounter++;
        });

        const totalQuestions = questions.length;
        const finalScore = Math.round((score / totalQuestions) * 100);

        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `채점이 완료되었습니다. 총 ${totalQuestions}문제 중 ${score}문제를 맞추셨습니다. (점수: ${finalScore}점)`;
        resultDiv.classList.add(finalScore >= 60 ? 'correct' : 'incorrect');

        const now = new Date();
        const timestamp = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2, '0')}${now.getDate().toString().padStart(2, '0')}_${now.getHours().toString().padStart(2, '0')}${now.getMinutes().toString().padStart(2, '0')}`;
        
        const filename = `${studentId}_${studentName}_${finalScore}점_${timestamp}.txt`;
        
        const fileHeaderText = `채점 결과\n총점: ${finalScore}점 (${totalQuestions}문제 중 ${score}문제 정답)\n응시 시각: ${now.toLocaleString('ko-KR')}\n\n`;
        resultText = fileHeaderText + resultText;

        const blob = new Blob([resultText], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').textContent = "채점 완료 (결과 파일 다운로드됨)";
        const formInputs = form.getElementsByTagName('input');
        for(let i = 0; i < formInputs.length; i++) {
            formInputs[i].disabled = true;
        }
        window.scrollTo(0, 0);
    }
</script>
