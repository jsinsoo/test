<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>321. 문제 분해 평가 프로그램</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; max-width: 800px; margin: 20px auto; padding: 20px; background-color: #f9f9f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #2c3e50; text-align: center; }
        h2 { border-bottom: 2px solid #3498db; color: #3498db; padding-bottom: 5px; }
        .question { margin-bottom: 20px; padding: 15px; border-left: 5px solid #3498db; background: #f0f7ff; }
        .options label { display: block; cursor: pointer; margin: 5px 0; }
        .info-input { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        input[type="text"] { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 150px; }
        button { display: block; width: 100%; padding: 15px; background: #3498db; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; }
        button:hover { background: #2980b9; }
        .feedback { margin-top: 10px; padding: 10px; border-radius: 5px; display: none; }
        .correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .wrong { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .expl { font-size: 0.9em; margin-top: 5px; color: #555; }
    </style>
</head>
<body>

<h1>Ⅲ. 문제 분해 평가</h1>

<div class="card info-input">
    <input type="text" id="stdId" placeholder="학번">
    <input type="text" id="stdName" placeholder="이름">
</div>

<div class="card">
    <h2>1. 진단평가 (OX 퀴즈)</h2>
    <div id="ox-questions"></div>
</div>

<div class="card">
    <h2>2. 형성평가 (5지 선다형)</h2>
    <div id="multi-questions"></div>
</div>

<button onclick="gradeQuiz()">제출 및 결과 확인</button>

<div id="result-card" class="card" style="display:none; margin-top:30px; text-align:center;">
    <h2 id="final-score"></h2>
    <button onclick="saveToFile()" style="background-color: #27ae60;">결과 파일(.txt) 저장</button>
</div>

<script>
const oxData = [
    { q: "문제 분해는 큰 문제를 작고 관리 가능한 하위 문제로 나누는 과정이다.", a: "O", e: "이것이 문제 분해(Decomposition)의 정확한 정의이며, 복잡한 문제를 해결하는 첫걸음입니다. " },
    { q: "알고리즘 설계 시, 문제 설명에 나오는 '동사'는 주로 클래스의 '속성'이 된다.", a: "X", e: "동사(Verbs)는 '행동'을 나타내므로 클래스의 '메서드'가 되며, '명사'가 클래스나 속성이 됩니다. " },
    { q: "추상화(Abstraction)는 객체의 모든 세부적인 내부 구현을 외부에 공개하는 것을 의미한다.", a: "X", e: "추상화는 복잡한 내부 구현은 숨기고, 사용하기 쉬운 인터페이스만 외부에 공개하는 것을 의미합니다. " },
    { q: "의사코드(Pseudocode)는 실제 실행은 불가능하지만, 알고리즘의 논리를 설계하고 표현하는 데 유용하다.", a: "O", e: "의사코드는 특정 언어 문법에 얽매이지 않고 아이디어를 빠르게 스케치하고 검증하는 데 효과적입니다. " },
    { q: "\"is-a\" 관계(예: 강아지는 동물이다)는 상속으로 모델링하는 것이 일반적이다.", a: "O", e: "이는 객체지향 설계의 중요 원칙으로, 'is-a'는 상속으로, 'has-a'는 포함으로 모델링합니다. " },
    { q: "하향식(Top-down) 설계는 가장 작고 기본적인 부품부터 만든 뒤 조립하는 방식이다.", a: "X", e: "이는 상향식(Bottom-up)에 대한 설명입니다. 하향식은 전체 시스템에서 세부 부분으로 나누어 내려가는 방식입니다. " },
    { q: "모델링은 현실 세계의 대상을 컴퓨터가 이해할 수 있도록 단순화하고 구조화하는 과정이다.", a: "O", e: "문제 해결에 필요한 핵심적인 속성과 행동만을 추려내어 표현하는 것이 모델링의 핵심입니다. " },
    { q: "설계 없이 코딩을 시작하면 장기적으로 유지보수 비용이 증가하는 '기술 부채'가 발생할 수 있다.", a: "O", e: "좋은 설계 없는 코딩은 구조가 뒤죽박죽이 되기 쉬워 수정과 확장이 어려워집니다. " },
    { q: "파이썬에서 pass를 사용해 스켈레톤 코드를 만드는 것은 전체 구조를 먼저 잡는 설계 철학과 관련 있다.", a: "O", e: "pass를 통해 로직은 비어있지만 문법적으로 완전한 구조를 먼저 잡는 방식은 설계와 구현을 분리하는 철학입니다. " },
    { q: "객체지향 분석/설계는 오직 객체지향 언어에서만 유용한 사고방식이다.", a: "X", e: "객체와 그 관계로 나누어 생각하는 방식은 절차지향 언어에서도 코드를 구조화하는 데 큰 도움이 됩니다. [cite: 94]" }
];

const multiData = [
    { q: "\"온라인 쇼핑몰\" 설계 시 클래스로 모델링하기 가장 부적절한 것은?", o: ["고객", "상품", "주문", "장바구니", "클릭하기"], a: 5, e: "'클릭하기'는 행위(동사)이므로 메서드가 되는 것이 적절하며 나머지는 명사 객체입니다. " },
    { q: "\"자동차\" 클래스 설계 시 'has-a' 관계로 모델링되어야 할 속성은?", o: ["운송수단", "엔진", "탈것", "기계", "바퀴달린것"], a: 2, e: "'자동차는 엔진을 가진다'가 성립하므로 엔진은 포함(has-a) 관계가 적절합니다. " },
    { q: "다음 중 '메서드'로 추출하기 가장 적합한 행동은?", o: ["가진다", "입금하다, 출금하다, 조회하다", "계좌 번호, 잔액", "사용자", "은행 계좌"], a: 2, e: "객체가 수행하는 구체적인 행동(동사)들이 메서드가 됩니다. " },
    { q: "하향식(Top-down) 설계 방식에 대한 설명으로 올바른 것은?", o: ["기본 부품부터 설계한다", "전체 큰 그림에서 시작해 세부 모듈로 분해한다", "작은 함수를 먼저 많이 만든다", "코딩 완료 후 구조를 잡는다", "테스트 케이스를 먼저 작성한다"], a: 2, e: "하향식은 거대한 문제를 해결 가능한 작은 단위로 나누는 숲에서 나무를 보는 방식입니다. [cite: 100, 102]" },
    { q: "의사코드를 작성하는 과정의 주된 장점은?", o: ["성능 예측 가능", "디버깅 불필요", "순수한 논리에만 집중하여 설계 가능", "협업 불가능", "자동 최적화 코드 생성"], a: 3, e: "특정 언어 문법 대신 문제 해결 절차 자체에만 집중하도록 도와주는 도구입니다. [cite: 103, 105]" },
    { q: "파이썬에서 pass 키워드가 설계 단계에서 유용한 이유는?", o: ["성능 향상", "상속 방지", "내용은 나중에 구현하고 구조만 먼저 잡기 가능", "속성 비공개화", "자동 테스트"], a: 3, e: "문법 오류 없이 스켈레톤 코드를 작성하여 전체적인 구조를 먼저 잡을 수 있게 합니다. [cite: 106, 109]" },
    { q: "'분할 정복(Divide and Conquer)' 전략과 가장 관련 깊은 것은?", o: ["문제 분해", "데이터 압축", "예외 처리", "알고리즘 암호화", "네트워크 통신"], a: 1, e: "문제를 분할하고 해결한 뒤 합치는 전략은 문제 분해의 핵심 사상과 일치합니다. " },
    { q: "\"자동차 클래스 설계\" 시 첫 번째 단계로 가장 바람직한 것은?", o: ["즉시 코드 작성", "속성과 행동 정의 및 정리", "그래픽 라이브러리 찾기", "연비 공식 공부", "데이터베이스 설계"], a: 2, e: "구현에 앞서 대상의 본질(속성과 행동)을 파악하는 것이 설계의 출발점입니다. [cite: 111, 114]" },
    { q: "게임 캐릭터 속성(name, hp, power)과 행동(attack)을 가장 잘 구현한 코드는?", o: ["def Character(...)", "class Character: name=\"\"...", "class Character: __init__ 및 attack 구현", "character = { ... }", "class Character: attack(target, power)"], a: 3, e: "생성자에서 속성을 초기화하고 메서드로 행동을 정의한 코드가 설계에 가장 부합합니다. " },
    { q: "잘 설계된 객체지향 프로그램의 장점이 아닌 것은?", o: ["재사용성 향상", "구조가 명확함", "수정 및 관리 용이", "항상 가장 빠른 실행 속도 보장", "협업 용이"], a: 4, e: "객체지향은 유지보수와 재사용성에 목적이 있으며, 실행 속도가 항상 더 빠르지는 않습니다. " }
];

let finalScore = 0;
let detailedReport = "";

function init() {
    const oxCont = document.getElementById('ox-questions');
    oxData.forEach((d, i) => {
        oxCont.innerHTML += `<div class="question"><p>${i+1}. ${d.q}</p>
            <div class="options"><label><input type="radio" name="ox${i}" value="O"> O</label>
            <label><input type="radio" name="ox${i}" value="X"> X</label></div>
            <div id="ox-fb${i}" class="feedback"></div></div>`;
    });
    const multiCont = document.getElementById('multi-questions');
    multiData.forEach((d, i) => {
        let opts = d.o.map((o, idx) => `<label><input type="radio" name="m${i}" value="${idx+1}"> ${idx+1}. ${o}</label>`).join('');
        multiCont.innerHTML += `<div class="question"><p>${i+1}. ${d.q}</p>
            <div class="options">${opts}</div>
            <div id="m-fb${i}" class="feedback"></div></div>`;
    });
}

function gradeQuiz() {
    const sId = document.getElementById('stdId').value;
    const sName = document.getElementById('stdName').value;
    if(!sId || !sName) return alert("학번과 이름을 입력해주세요.");

    let score = 0;
    detailedReport = `[평가 결과] 학번: ${sId} / 이름: ${sName}\n\n`;

    oxData.forEach((d, i) => {
        const sel = document.querySelector(`input[name="ox${i}"]:checked`)?.value;
        const correct = sel === d.a;
        if(correct) score += 5;
        const fb = document.getElementById(`ox-fb${i}`);
        fb.style.display = "block";
        fb.className = "feedback " + (correct ? "correct" : "wrong");
        fb.innerHTML = `<strong>${correct ? "정답" : "오답"}</strong> (정답: ${d.a})<div class="expl">${d.e}</div>`;
        detailedReport += `${i+1}번(OX): ${correct ? 'O' : 'X'} (정답:${d.a}) - ${d.e}\n`;
    });

    multiData.forEach((d, i) => {
        const sel = document.querySelector(`input[name="m${i}"]:checked`)?.value;
        const correct = parseInt(sel) === d.a;
        if(correct) score += 5;
        const fb = document.getElementById(`m-fb${i}`);
        fb.style.display = "block";
        fb.className = "feedback " + (correct ? "correct" : "wrong");
        fb.innerHTML = `<strong>${correct ? "정답" : "오답"}</strong> (정답: ${d.a}번)<div class="expl">${d.e}</div>`;
        detailedReport += `${i+1}번(선다): ${correct ? 'O' : 'X'} (정답:${d.a}번) - ${d.e}\n`;
    });

    finalScore = score;
    document.getElementById('final-score').innerText = `최종 점수: ${score}점 / 100점`;
    document.getElementById('result-card').style.display = "block";
    window.scrollTo(0, document.body.scrollHeight);
}

function saveToFile() {
    const sId = document.getElementById('stdId').value;
    const sName = document.getElementById('stdName').value;
    const now = new Date();
    const time = `${now.getHours()}시${now.getMinutes()}분`;
    const fileName = `${sId}_${sName}_${finalScore}_321_${time}.txt`;
    const content = detailedReport + `\n총점: ${finalScore}점\n응시시각: ${now.toLocaleString()}`;
    const blob = new Blob([content], {type: "text/plain;charset=utf-8"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = fileName;
    link.click();
}

init();
</script>
</body>
</html>
