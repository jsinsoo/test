<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>네트워크 환경 구성과 설정 평가</title>
    <style>
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            line-height: 1.7;
            margin: 20px;
            background-color: #f8f9fa;
            color: #212529;
        }
        .container {
            max-width: 850px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 1px solid #dee2e6;
        }
        h1, h2 {
            color: #0056b3;
            border-bottom: 2px solid #0056b3;
            padding-bottom: 10px;
            margin-top: 25px;
        }
        h1 { margin-top: 0; }
        .info-input {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            background-color: #f1f3f5;
            display: flex;
            align-items: center;
        }
        .info-input label {
            margin-right: 10px;
            font-weight: bold;
        }
        .info-input input {
            padding: 8px;
            border: 1px solid #adb5bd;
            border-radius: 5px;
            margin-right: 20px;
        }
        .question {
            margin-bottom: 25px;
            padding: 20px;
            border-left: 5px solid #007bff;
            background-color: #fdfdff;
            border-radius: 0 8px 8px 0;
            border: 1px solid #e0e0e0;
            border-left-width: 5px;

        }
        .question p {
            font-size: 1.15em;
            font-weight: bold;
            margin: 0 0 15px 0;
        }
        .question label {
            display: block;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            border: 1px solid #f0f0f0;
        }
        .question label:hover {
            background-color: #e9ecef;
        }
        .explanation {
            margin-top: 15px;
            padding: 12px;
            border-radius: 5px;
            background-color: #e7f3fe;
            border: 1px solid #bce0fd;
            display: none; /* Initially hidden */
            font-size: 0.95em;
        }
        #submitBtn {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.25em;
            font-weight: bold;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin-top: 30px;
        }
        #submitBtn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        #result {
            margin-top: 25px;
            padding: 20px;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
        }
        .correct {
            background-color: #d1e7dd !important;
            border-color: #a3cfbb !important;
            font-weight: bold;
        }
        .incorrect {
            background-color: #f8d7da !important;
            border-color: #f1aeb5 !important;
        }
        .correct-answer {
            font-weight: bold;
            color: #0a58ca;
        }
        .tts-button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2em;
            margin-left: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>네트워크 환경 구성과 설정 평가</h1>

    <div class="info-input">
        <label for="studentId">학번:</label>
        <input type="text" id="studentId" placeholder="학번 입력">
        <label for="studentName">이름:</label>
        <input type="text" id="studentName" placeholder="이름 입력">
    </div>

    <form id="quizForm">
        <!-- Questions will be dynamically inserted here -->
    </form>
    
    <button id="submitBtn" onclick="gradeAndSubmit(event)">제출 및 채점</button>

    <div id="result"></div>
</div>

<script>
    const synth = window.speechSynthesis;
    function speak(text) {
        if (synth.speaking) {
            synth.cancel();
        }
        const utterThis = new SpeechSynthesisUtterance(text);
        utterThis.lang = 'ko-KR';
        synth.speak(utterThis);
    }

    const questions = [
        {
            type: 'ox',
            sectionTitle: "I. 진단평가 (OX 퀴즈)",
            question: "DHCP는 사용자가 IP 주소를 직접 수동으로 설정하는 방식이다.",
            answer: "X",
            explanation: "DHCP(Dynamic Host Configuration Protocol)는 컴퓨터가 네트워크에 접속할 때 IP 주소, 서브넷 마스크 등의 정보를 '자동으로' 할당받는 방식입니다. 수동으로 설정하는 방식은 '정적(Static) IP' 방식입니다."
        },
        {
            type: 'ox',
            question: "서브넷 마스크는 IP 주소에서 네트워크 부분과 호스트 부분을 구분하는 역할을 한다.",
            answer: "O",
            explanation: "서브넷 마스크는 IP 주소에 비트 AND 연산을 적용하여, 어디까지가 모든 장치가 공유하는 네트워크 주소(네트워크 ID)이고 어디부터가 각 장치의 고유 주소(호스트 ID)인지를 구분해주는 '가면(Mask)' 역할을 합니다."
        },
        {
            type: 'ox',
            question: "다른 웹사이트에 접속하기 위해 사용하는 인터넷 공유기의 IP 주소를 보통 DNS 서버 주소라고 한다.",
            answer: "X",
            explanation: "외부 네트워크로 나가는 '관문' 역할을 하는 인터넷 공유기의 주소는 '기본 게이트웨이(Default Gateway)' 주소입니다. DNS 서버 주소는 도메인 이름을 IP 주소로 변환해주는 별도의 서버 주소입니다."
        },
        {
            type: 'ox',
            question: "컴퓨터에 DNS 서버 주소가 설정되어 있지 않으면, 웹사이트의 IP 주소를 직접 입력해서는 접속할 수 없다.",
            answer: "X",
            explanation: "DNS 서버는 도메인 이름(예: www.google.com)을 IP 주소로 '변환'해주는 역할만 합니다. 만약 IP 주소를 이미 알고 있다면, DNS 서버를 거칠 필요 없이 IP 주소를 직접 입력하여 사이트에 접속할 수 있습니다."
        },
        {
            type: 'ox',
            question: "정적 IP는 주소가 바뀌지 않아 외부에서 항상 동일한 주소로 접속해야 하는 서버 운영에 적합하다.",
            answer: "O",
            explanation: "서버는 항상 같은 주소로 외부에서 접속할 수 있어야 하므로, 주소가 계속 바뀌는 동적 IP보다는 고정된 정적 IP를 사용하는 것이 안정적이고 관리에 용이합니다."
        },
        {
            type: 'ox',
            question: "192.168.0.10과 192.168.1.10은 서브넷 마스크가 255.255.255.0일 때 같은 로컬 네트워크에 있다.",
            answer: "X",
            explanation: "서브넷 마스크가 255.255.255.0이면 IP 주소의 앞 세 부분(192.168.x)이 네트워크 ID가 됩니다. 두 IP는 세 번째 부분(0과 1)이 다르므로 서로 다른 네트워크에 속합니다."
        },
        {
            type: 'ox',
            question: "기본 게이트웨이는 우리 집 컴퓨터가 같은 네트워크(LAN)에 있는 옆방 컴퓨터와 통신할 때 반드시 필요하다.",
            answer: "X",
            explanation: "기본 게이트웨이는 '외부' 네트워크와 통신할 때 사용되는 관문입니다. 옆방 컴퓨터처럼 같은 로컬 네트워크(LAN) 내에 있는 장치와 통신할 때는 게이트웨이를 거치지 않고 직접 통신합니다."
        },
        {
            type: 'ox',
            question: "DHCP 서버는 IP 주소뿐만 아니라 서브넷 마스크, 게이트웨이, DNS 서버 정보도 함께 제공해줄 수 있다.",
            answer: "O",
            explanation: "DHCP는 단순히 IP 주소만 할당하는 것이 아니라, 해당 네트워크를 사용하는 데 필요한 모든 설정 정보(IP, 서브넷, 게이트웨이, DNS 등)를 패키지로 묶어 클라이언트에게 전달해줍니다."
        },
        {
            type: 'ox',
            question: "서브넷 마스크 255.255.0.0은 255.255.255.0보다 더 많은 수의 호스트(컴퓨터)를 포함할 수 있는 네트워크를 정의한다.",
            answer: "O",
            explanation: "255.255.0.0은 호스트 ID로 16비트(뒤 두 부분)를 사용 가능하지만, 255.255.255.0은 8비트(마지막 부분)만 사용 가능합니다. 따라서 255.255.0.0이 훨씬 더 큰 네트워크(더 많은 호스트)를 의미합니다."
        },
        {
            type: 'ox',
            question: "도메인 이름(예: www.naver.com)을 사용하는 주된 이유는 IP 주소보다 보안에 더 뛰어나기 때문이다.",
            answer: "X",
            explanation: "도메인 이름을 사용하는 주된 이유는 숫자로 된 IP 주소보다 사람이 기억하고 사용하기 훨씬 편리하기 때문입니다. 보안과는 직접적인 관련이 적습니다."
        },
        {
            type: 'mcq',
            sectionTitle: "II. 형성평가 (5지선다형)",
            question: "PC의 네트워크 설정을 확인했더니 IP 주소가 169.254.x.x로 시작했다. 이 현상의 가장 가능성 높은 원인은?",
            options: ["정상적으로 인터넷에 연결된 상태이다.", "DNS 서버 설정이 잘못되었다.", "정적 IP가 성공적으로 설정되었다.", "DHCP 서버로부터 IP 주소를 할당받지 못했다.", "게이트웨이 주소가 존재하지 않는다."],
            answer: 3,
            explanation: "169.254.x.x 대역의 주소는 APIPA(Automatic Private IP Addressing) 주소라고 합니다. 이는 운영체제가 DHCP 서버를 찾았지만 응답을 받지 못했을 때, 임시로 스스로에게 할당하는 링크-로컬 주소입니다. 즉, DHCP 서버와 통신에 실패했음을 의미합니다."
        },
        {
            type: 'mcq',
            question: "다음 중 외부 인터넷(WAN)과 통신하기 위해 반드시 정확하게 설정되어야 하는 정보는?",
            options: ["내 컴퓨터 이름", "서브넷 마스크", "기본 게이트웨이", "MAC 주소", "블루투스 PIN 번호"],
            answer: 2,
            explanation: "기본 게이트웨이는 로컬 네트워크(LAN)에서 외부 네트워크(WAN)로 나가는 유일한 '출구'입니다. 이 주소가 잘못 설정되면 컴퓨터는 인터넷 세상으로 나가는 길을 찾지 못해 외부와 통신할 수 없습니다."
        },
        {
            type: 'mcq',
            question: "인터넷 브라우저에 www.google.com을 입력하면 접속되지만, 216.58.220.142(구글 IP)를 입력하면 접속되지 않는다. 어떤 설정에 문제가 있을 가능성이 가장 높은가?",
            options: ["IP 주소 할당 문제", "서브넷 마스크 설정 오류", "기본 게이트웨이 설정 오류", "DNS 서버 설정 오류", "위 보기 중에는 답이 없음"],
            answer: 4,
            explanation: "이 문제는 질문의 전제가 현실과 다릅니다. 일반적으로 도메인으로 접속 안될 때 DNS 문제, IP로 접속 안될 때 게이트웨이/방화벽 문제입니다. 질문의 전제가 비현실적이므로 주어진 보기에서는 명확한 답을 찾기 어렵습니다. (만약 문제가 '도메인은 안되고 IP는 될 때' 였다면 정답은 ④번입니다.)"
        },
        {
            type: 'mcq',
            question: "IP 주소가 192.168.30.5이고 서브넷 마스크가 255.255.255.0일 때, 이 컴퓨터의 네트워크 ID는 무엇인가?",
            options: ["192.168.30.5", "255.255.255.0", "192.168.30.0", "0.0.0.5", "192.168.0.0"],
            answer: 2,
            explanation: "서브넷 마스크 255.255.255.0은 IP 주소의 앞 3부분까지가 네트워크 ID임을 의미합니다. 따라서 IP(192.168.30.5)와 마스크(255.255.255.0)를 AND 연산하면 네트워크 ID는 192.168.30.0이 됩니다."
        },
        {
            type: 'mcq',
            question: "다음 중 동적 IP 할당 방식(DHCP)의 가장 큰 장점은?",
            options: ["모든 컴퓨터가 고정된 IP를 사용하여 관리가 쉽다.", "IP 주소를 수동으로 설정하여 충돌 위험이 없다.", "네트워크 관리자가 IP를 일일이 할당할 필요가 없어 편리하다.", "서버 컴퓨터 운영에 가장 적합한 방식이다.", "한번 할당받은 IP는 절대 변하지 않는다."],

        },
        {

            answer: 3,
            explanation: "인터넷이 잘 된다는 것은 IP, 서브넷 마스크, 게이트웨이, DNS 등 기본 설정이 올바르다는 뜻입니다. 특정 서비스만 안될 경우, 해당 서비스 포트를 막는 방화벽(②), 공유기 설정(③) 또는 서비스 서버 자체의 문제(①,⑤)일 가능성이 높습니다. 서브넷 마스크는 기본 인터넷 연결 자체에 영향을 주므로 이미 확인된 부분입니다."
        },
        {

        },

            options: ["A와 B는 서로 다른 네트워크에 있다.", "A와 B는 같은 로컬 네트워크(LAN)에 있다.", "A가 B에게 통신하려면 반드시 게이트웨이를 거쳐야 한다.", "서브넷 마스크가 잘못 설정되었다.", "A와 B는 같은 컴퓨터이다."],
            answer: 1,
            explanation: "서브넷 마스크가 255.255.0.0이면 IP 주소의 앞 두 부분(172.16)이 네트워크 ID가 됩니다. A와 B 모두 네트워크 ID가 172.16으로 동일하므로, 같은 로컬 네트워크에 속해 있습니다."

        {

            explanation: "DHCP(Dynamic Host Configuration Protocol)는 네트워크에 접속하는 클라이언트에게 IP 주소, 서브넷 마스크 등의 설정 정보를 자동으로 할당해주는 역할을 하는 프로토콜입니다."

        {
            type: 'mcq',
            question: "카페의 공용 와이파이에 접속할 때 내 노트북이 IP 주소를 할당받는 과정은 다음 중 어느 것에 가장 가까운가?",
            options: ["정적 IP 설정", "DHCP를 통한 동적 IP 할당", "DNS 서버에 직접 주소 요청", "MAC 주소를 IP 주소로 사용", "APIPA를 통한 주소 자동 생성"],
            answer: 1,
            explanation: "카페, 학교 등 불특정 다수가 접속하는 공용 네트워크에서는 각 사용자에게 일일이 IP를 수동 설정할 수 없습니다. 따라서 카페의 공유기(라우터)가 DHCP 서버 역할을 하여 접속 장치에 IP를 자동으로 분배해주는 동적 IP 할당 방식을 사용합니다."
        }
    ];

    const form = document.getElementById('quizForm');
    let questionCounter = 1;
    let currentSection = '';

    questions.forEach((q, index) => {
        if (q.sectionTitle && currentSection !== q.sectionTitle) {
            currentSection = q.sectionTitle;
            const sectionHeader = document.createElement('h2');
            sectionHeader.textContent = currentSection;
            form.appendChild(sectionHeader);
            questionCounter = 1;
        }

        const questionDiv = document.createElement('div');
        questionDiv.className = 'question';
        questionDiv.id = 'q-container-' + index;

        const questionText = document.createElement('p');
        questionText.innerHTML = `${questionCounter}. ${q.question} <button type="button" class="tts-button" onclick="speak('${q.question}')" title="문제 읽어주기">🔊</button>`;
        questionDiv.appendChild(questionText);

        if (q.type === 'ox') {
            ['O', 'X'].forEach(opt => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'q' + index;
                radio.value = opt;
                label.appendChild(radio);
                label.append(` ${opt}`);
                questionDiv.appendChild(label);
            });
        } else if (q.type === 'mcq') {
            q.options.forEach((opt, optIndex) => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'q' + index;
                radio.value = optIndex;
                label.appendChild(radio);
                label.append(` ${optIndex + 1}. ${opt}`);
                questionDiv.appendChild(label);
            });
        }

        const explanationDiv = document.createElement('div');
        explanationDiv.className = 'explanation';
        explanationDiv.id = 'exp' + index;
        explanationDiv.innerHTML = `<strong>상세 풀이:</strong> ${q.explanation}`;
        questionDiv.appendChild(explanationDiv);

        form.appendChild(questionDiv);
        questionCounter++;
    });

    function gradeAndSubmit(event) {
        event.preventDefault();

        const studentId = document.getElementById('studentId').value.trim();
        const studentName = document.getElementById('studentName').value.trim();

        if (!studentId || !studentName) {
            alert("학번과 이름을 모두 입력해주세요.");
            return;
        }

        let score = 0;
        let resultText = `학생 정보\n학번: ${studentId}\n이름: ${studentName}\n\n`;
        resultText += "========================================\n\n";
        
        let fileQuestionCounter = 1;
        let currentSectionForFile = '';

        questions.forEach((q, index) => {
            if (q.sectionTitle && currentSectionForFile !== q.sectionTitle) {
                currentSectionForFile = q.sectionTitle;
                if (index > 0) resultText += "\n========================================\n\n";
                resultText += `${currentSectionForFile}\n\n`;
                fileQuestionCounter = 1;
            }

            const container = document.getElementById('q-container-' + index);
            const explanation = document.getElementById('exp' + index);
            explanation.style.display = 'block';
            
            const selectedRadio = form.elements['q' + index];
            const userAnswer = selectedRadio ? selectedRadio.value : "";
            let isCorrect = false;

            let userAnswerText = "(미응답)";
            let correctAnswerText = "";

            if (q.type === 'ox') {
                isCorrect = (userAnswer === q.answer);
                userAnswerText = userAnswer ? `선택: ${userAnswer}` : "(미응답)";
                correctAnswerText = `정답: ${q.answer}`;
            } else if (q.type === 'mcq') {
                isCorrect = (userAnswer == q.answer);
                userAnswerText = userAnswer ? `선택: ${parseInt(userAnswer)+1}번. ${q.options[userAnswer]}` : "(미응답)";
                correctAnswerText = `정답: ${q.answer+1}번. ${q.options[q.answer]}`;
            }

            resultText += `${fileQuestionCounter}. ${q.question}\n`;
            resultText += `${userAnswerText}\n`;

            const labels = container.getElementsByTagName('label');

            if (isCorrect) {
                score++;
                resultText += "결과: 정답 (O)\n";
                if(userAnswer !== "") {
                   const selectedLabelIndex = q.type === 'ox' ? (userAnswer === 'O' ? 0 : 1) : parseInt(userAnswer);
                   labels[selectedLabelIndex].classList.add('correct');
                }
            } else {
                resultText += "결과: 오답 (X)\n";
                resultText += `${correctAnswerText}\n`;
                if(userAnswer !== "") {
                    const selectedLabelIndex = q.type === 'ox' ? (userAnswer === 'O' ? 0 : 1) : parseInt(userAnswer);
                    if(labels[selectedLabelIndex]) labels[selectedLabelIndex].classList.add('incorrect');
                }
                const correctLabelIndex = q.type === 'ox' ? (q.answer === 'O' ? 0 : 1) : q.answer;
                const correctLabel = labels[correctLabelIndex];
                if(correctLabel) {
                    correctLabel.classList.add('correct');
                    correctLabel.innerHTML += ' <span class="correct-answer"> &lt;-- 정답</span>';
                }
            }

            resultText += `상세 풀이: ${q.explanation}\n\n`;
            fileQuestionCounter++;
        });

        const totalQuestions = questions.length;
        const finalScore = Math.round((score / totalQuestions) * 100);

        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `채점이 완료되었습니다. 총 ${totalQuestions}문제 중 ${score}문제를 맞추셨습니다. (점수: ${finalScore}점)`;
        resultDiv.classList.add(finalScore >= 60 ? 'correct' : 'incorrect');

        const now = new Date();
        const timestamp = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2, '0')}${now.getDate().toString().padStart(2, '0')}_${now.getHours().toString().padStart(2, '0')}${now.getMinutes().toString().padStart(2, '0')}`;
        const filename = `${studentId}_${studentName}_112_${finalScore}점_${timestamp}.txt`;
        
        resultText = `채점 결과\n총점: ${finalScore}점 (${totalQuestions}문제 중 ${score}문제 정답)\n응시 시각: ${now.toLocaleString('ko-KR')}\n\n` + resultText;

        const blob = new Blob([resultText], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').textContent = "채점 완료 (결과 파일 다운로드됨)";
        const formInputs = form.getElementsByTagName('input');
        for(let i = 0; i < formInputs.length; i++) {
            formInputs[i].disabled = true;
        }
        window.scrollTo(0, 0);
    }
</script>
