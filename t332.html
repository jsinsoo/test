<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>332. 변수와 연산자 평가 프로그램</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; max-width: 850px; margin: 20px auto; padding: 20px; background-color: #f8f9fa; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #e67e22; padding-bottom: 10px; }
        h2 { color: #e67e22; margin-top: 30px; border-left: 5px solid #e67e22; padding-left: 10px; }
        .question-item { margin-bottom: 25px; padding: 15px; border-radius: 8px; background: #fff; border: 1px solid #ddd; }
        .options label { display: block; cursor: pointer; margin: 8px 0; padding: 8px; border-radius: 4px; transition: 0.2s; }
        .options label:hover { background: #fff5eb; }
        .info-inputs { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; }
        input[type="text"] { padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; width: 180px; }
        button { display: block; width: 100%; padding: 18px; background: #e67e22; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:hover { background: #d35400; }
        .feedback { margin-top: 15px; padding: 12px; border-radius: 6px; display: none; font-size: 0.95em; }
        .correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .wrong { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .explanation { display: block; margin-top: 8px; color: #666; font-style: italic; }
        #result-section { display: none; text-align: center; }
        code { background: #eee; padding: 2px 4px; border-radius: 4px; }
    </style>
</head>
<body>

<h1>Ⅲ. 변수와 연산자 평가 (332)</h1>

<div class="card info-inputs">
    <input type="text" id="stuNum" placeholder="학번">
    <input type="text" id="stuName" placeholder="이름 입력">
</div>

<div class="card">
    <h2>1. 진단평가 (OX 퀴즈)</h2>
    <div id="ox-area"></div>
</div>

<div class="card">
    <h2>2. 형성평가 (5지 선다형)</h2>
    <div id="multi-area"></div>
</div>

<button onclick="processQuiz()">평가 제출 및 결과 확인</button>

<div id="result-section" class="card">
    <h2 id="score-text"></h2>
    <p>아래 버튼을 눌러 상세 결과 보고서를 저장하세요.</p>
    <button onclick="downloadReport()" style="background-color: #27ae60;">결과 파일(.txt) 저장</button>
</div>

<script>
const oxQuestions = [
    { q: "<code>x = 10</code> 코드에서 <code>=</code>는 'x와 10이 같다'는 수학적 의미이다.", a: "X", e: "프로그래밍에서 <code>=</code>는 할당(대입) 연산자입니다. 오른쪽의 값을 왼쪽 변수에 저장하라는 명령이며, 같음을 비교할 때는 <code>==</code>를 사용합니다." },
    { q: "<code>10 / 3</code>의 결과와 <code>10 // 3</code>의 결과는 같다.", a: "X", e: "<code>/</code>는 실수 나눗셈(3.33...)을 수행하고, <code>//</code>는 정수 나눗셈(몫, 3)을 수행합니다." },
    { q: "<code>x = 10</code>일 때, <code>x == 10</code>의 결과는 <code>True</code>이다.", a: "O", e: "<code>==</code>는 비교 연산자로, x의 값인 10과 우변의 10이 같으므로 참(True)이 됩니다." },
    { q: "<code>True and False</code>의 결과는 <code>True</code>이다.", a: "X", e: "<code>and</code> 연산은 양쪽이 모두 참일 때만 참입니다. 하나가 거짓이므로 결과는 <code>False</code>입니다." },
    { q: "<code>2 ** 3</code>은 2의 3제곱인 8을 의미한다.", a: "O", e: "<code>**</code>는 거듭제곱을 계산하는 연산자입니다." },
    { q: "<code>10 != 5</code>의 결과는 <code>True</code>이다.", a: "O", e: "<code>!=</code>는 '같지 않음'을 비교하는 연산자이며, 10과 5는 다르므로 참입니다." },
    { q: "변수 이름은 숫자로 시작할 수 있다.", a: "X", e: "변수 이름은 문자로 시작해야 하며, 숫자로 시작할 수 없습니다." },
    { q: "<code>x = x + 1</code>은 수학적으로 성립하지 않으므로 프로그래밍에서도 오류가 발생한다.", a: "X", e: "프로그래밍에서는 '현재 x 값에 1을 더해 다시 x에 저장하라'는 의미로 매우 자주 쓰이는 할당 문장입니다." },
    { q: "논리 연산자 <code>not</code>은 참을 거짓으로, 거짓을 참으로 뒤집는다.", a: "O", e: "<code>not</code>은 논리 상태를 반전시키는 부정 연산자입니다." },
    { q: "나머지 연산자 <code>%</code>는 주로 짝수/홀수 판별이나 배수 확인에 쓰인다.", a: "O", e: "2로 나눈 나머지가 0이면 짝수, 아니면 홀수임을 판별하는 등 유용하게 쓰입니다." }
];

const multiQuestions = [
    { q: "<code>x = 5</code>, <code>y = 2</code>일 때, <code>x % y</code>의 값은?", o: ["2.5", "2", "1", "0", "7"], a: 3, e: "5를 2로 나누면 몫은 2이고 나머지는 1입니다. <code>%</code>는 나머지를 구하는 연산자입니다." },
    { q: "다음 중 변수 이름으로 사용할 수 있는 것은?", o: ["3rd_value", "if", "my-score", "total_count", "name!"], a: 4, e: "변수명에 특수문자는 언더바(_)만 가능하며, 숫자로 시작하거나 예약어(if 등)는 사용할 수 없습니다." },
    { q: "<code>not (5 > 3)</code>의 결과값은?", o: ["True", "False", "8", "2", "None"], a: 2, e: "5 > 3은 참(True)이며, 이를 <code>not</code>으로 반전시키면 거짓(False)이 됩니다." },
    { q: "<code>result = 2 + 3 * 4</code> 실행 후 result의 값은?", o: ["20", "14", "9", "24", "12"], a: 2, e: "곱셈(*)이 덧셈(+)보다 우선순위가 높으므로 3 * 4 = 12를 먼저 계산한 후 2를 더해 14가 됩니다." },
    { q: "다음 중 <code>=</code>와 <code>==</code>의 사용법이 모두 올바른 코드는?", o: ["if (x = 10):", "x == 10", "if x == 10: x = x + 1", "if x = y: print()", "print(x = 10)"], a: 3, e: "조건식에는 비교 연산자 <code>==</code>를, 값을 변경할 때는 할당 연산자 <code>=</code>를 사용해야 합니다." },
    { q: "\"온도가 0도 미만이거나 100도 이상\"을 나타내는 올바른 조건식은?", o: ["temp < 0 and temp >= 100", "temp < 0 or temp >= 100", "not (temp >= 0)", "0 < temp < 100", "temp != 0"], a: 2, e: "'~이거나'는 논리합인 <code>or</code> 연산자를 사용해야 합니다." },
    { q: "변수 <code>a = 10</code>, <code>b = 20</code>일 때 두 값을 서로 바꾸는 올바른 방법은?", o: ["a = b; b = a", "temp = a; a = b; b = temp", "a = b", "b = a", "temp = b; b = a"], a: 2, e: "값을 덮어쓰기 전에 임시 변수(temp)에 한 쪽 값을 보관해두어야 데이터 유실 없이 교환이 가능합니다." },
    { q: "파이썬에서 <code>x += 1</code>의 의미는?", o: ["x가 1과 같다", "x를 1 증가시킨다", "x에 1을 곱한다", "x를 1로 나눈다", "x가 1보다 크다"], a: 2, e: "복합 할당 연산자로 <code>x = x + 1</code>과 동일한 의미입니다." },
    { q: "<code>\"Hello\" + \"World\"</code> 연산의 결과는?", o: ["HelloWorld", "Hello World", "오류 발생", "Helloworld", "Hello+World"], a: 1, e: "문자열에 <code>+</code> 연산자를 사용하면 공백 없이 두 문자열을 이어 붙입니다." },
    { q: "비교 연산의 결과로 나올 수 있는 자료형은?", o: ["int", "float", "str", "bool (True/False)", "list"], a: 4, e: "크다, 작다, 같다 등의 비교 결과는 오직 참(True) 또는 거짓(False)인 불(bool) 자료형으로 반환됩니다." }
];

let userScore = 0;
let reportText = "";

function setup() {
    const oxDiv = document.getElementById('ox-area');
    oxQuestions.forEach((q, i) => {
        oxDiv.innerHTML += `
            <div class="question-item">
                <p><strong>Q${i+1}.</strong> ${q.q}</p>
                <div class="options">
                    <label><input type="radio" name="ox${i}" value="O"> O</label>
                    <label><input type="radio" name="ox${i}" value="X"> X</label>
                </div>
                <div id="ox-fb-${i}" class="feedback"></div>
            </div>`;
    });

    const multiDiv = document.getElementById('multi-area');
    multiQuestions.forEach((q, i) => {
        let opts = q.o.map((opt, idx) => `<label><input type="radio" name="m${i}" value="${idx+1}"> ${idx+1}. ${opt}</label>`).join('');
        multiDiv.innerHTML += `
            <div class="question-item">
                <p><strong>Q${i+1}.</strong> ${q.q}</p>
                <div class="options">${opts}</div>
                <div id="m-fb-${i}" class="feedback"></div>
            </div>`;
    });
}

function processQuiz() {
    const num = document.getElementById('stuNum').value;
    const name = document.getElementById('stuName').value;
    if(!num || !name) return alert("학번과 이름을 입력해주세요.");

    let score = 0;
    reportText = `[332 변수와 연산자 평가 결과]\n학번: ${num} / 이름: ${name}\n\n`;

    oxQuestions.forEach((q, i) => {
        const sel = document.querySelector(`input[name="ox${i}"]:checked`)?.value;
        const isCorrect = sel === q.a;
        if(isCorrect) score += 5;
        displayFeedback(`ox-fb-${i}`, isCorrect, q.a, q.e);
        reportText += `OX ${i+1}번: ${isCorrect ? '정답' : '오답'} (정답: ${q.a}) - ${q.e}\n`;
    });

    multiQuestions.forEach((q, i) => {
        const sel = document.querySelector(`input[name="m${i}"]:checked`)?.value;
        const isCorrect = parseInt(sel) === q.a;
        if(isCorrect) score += 5;
        displayFeedback(`m-fb-${i}`, isCorrect, q.a, q.e);
        reportText += `선다 ${i+1}번: ${isCorrect ? '정답' : '오답'} (정답: ${q.a}번) - ${q.e}\n`;
    });

    userScore = score;
    reportText += `\n최종 점수: ${score}점`;
    document.getElementById('score-text').innerText = `${name}님의 최종 점수는 ${score}점입니다.`;
    document.getElementById('result-section').style.display = "block";
    window.scrollTo(0, document.body.scrollHeight);
}

function displayFeedback(id, isCorrect, ans, expl) {
    const el = document.getElementById(id);
    el.style.display = "block";
    el.className = "feedback " + (isCorrect ? "correct" : "wrong");
    el.innerHTML = `<strong>${isCorrect ? '정답입니다!' : '틀렸습니다.'}</strong> (정답: ${ans})<span class="explanation">${expl}</span>`;
}

function downloadReport() {
    const num = document.getElementById('stuNum').value;
    const name = document.getElementById('stuName').value;
    const now = new Date();
    const time = `${now.getHours()}시${now.getMinutes()}분`;
    const fileName = `${num}_${name}_${userScore}_332_${time}.txt`;
    
    const blob = new Blob([reportText], { type: 'text/plain;charset=utf-8' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = fileName;
    link.click();
}

setup();
</script>
</body>
</html>
